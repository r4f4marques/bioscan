<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioScan Healthspan — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#1a1a18}
.card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.logo{font-size:20px;font-weight:600;margin-bottom:4px;letter-spacing:-0.3px}
.logo span{font-weight:400;color:#888}
.sub{font-size:13px;color:#888;margin-bottom:2rem}
label{display:block;font-size:12px;color:#666;margin-bottom:4px;margin-top:12px}
input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#1a1a18;background:#fff;transition:border-color .15s}
input:focus{outline:none;border-color:#555}
.btn{width:100%;padding:10px;background:#1a1a18;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:1.5rem;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{font-size:12px;color:#c0392b;background:#fdf0ee;padding:8px 12px;border-radius:6px;margin-top:12px;display:none}
.hint{font-size:11px;color:#aaa;text-align:center;margin-top:1rem}
</style>
</head>
<body>
<div class="card">
  <div class="logo">BioScan <span>Healthspan</span></div>
  <div class="sub">Plataforma de análise de bioimpedância</div>

  <label>E-mail</label>
  <input type="email" id="email" placeholder="seu@email.com" value="demo@bioscan.fit">

  <label>Senha</label>
  <input type="password" id="password" placeholder="••••••••" value="demo">

  <button class="btn" id="btn" onclick="login()">Entrar</button>
  <div class="error" id="error"></div>
  <div class="hint">Demo: demo@bioscan.fit / demo</div>
</div>

<script>
const API = '';

async function login() {
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Entrando...';

  try {
    const res = await fetch(API + '/bioscan/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao fazer login');
    localStorage.setItem('bioscan_token', data.token);
    localStorage.setItem('bioscan_user', JSON.stringify(data.user));
    window.location.href = '/dashboard';
  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

document.addEventListener('keydown', e => { if(e.key === 'Enter') login(); });
if (localStorage.getItem('bioscan_token')) window.location.href = '/dashboard';
</script>
</body>
</html>
