<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioScan — Definir senha</title>
<style>
  :root {
    --fs-xs: 12px; --fs-sm: 14px; --fs-base: 16px; --fs-lg: 18px; --fs-2xl: 28px;
    --c-bg: #f5f4f0; --c-card: #fff; --c-text: #1a1a18;
    --c-text-sub: #666; --c-text-mute: #999;
    --c-border: rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--c-bg); color: var(--c-text);
    font-size: var(--fs-base); line-height: 1.5;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem 1rem;
  }
  .card {
    background: var(--c-card); border-radius: 12px;
    padding: 2rem 2.5rem; max-width: 440px; width: 100%;
    border: 0.5px solid var(--c-border);
  }
  .logo {
    font-size: var(--fs-lg); font-weight: 600;
    letter-spacing: -0.3px; margin-bottom: 1.5rem;
  }
  .logo span { font-weight: 400; color: var(--c-text-mute); }
  h1 { font-size: var(--fs-2xl); font-weight: 600; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
  .subtitle { font-size: var(--fs-sm); color: var(--c-text-sub); margin-bottom: 1.5rem; line-height: 1.6; }
  label { display: block; font-size: var(--fs-sm); color: var(--c-text-sub); margin: 1rem 0 6px; font-weight: 500; }
  input[type="password"] {
    width: 100%; padding: 11px 14px;
    border: 1px solid #ddd; border-radius: 8px;
    font-size: var(--fs-sm); font-family: inherit;
    background: var(--c-card); color: var(--c-text);
  }
  input:focus { outline: 2px solid #1a6fa8; outline-offset: -1px; border-color: #1a6fa8; }
  .btn {
    width: 100%; padding: 12px; margin-top: 1.5rem;
    border: none; border-radius: 8px;
    background: #1a1a18; color: #fff;
    font-size: var(--fs-sm); font-weight: 500; font-family: inherit;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .msg {
    padding: 12px 16px; border-radius: 8px; margin-top: 1rem;
    font-size: var(--fs-sm); line-height: 1.5;
  }
  .msg.error { background: #fde8e8; color: #a82020; }
  .msg.success { background: #e8f5e0; color: #2d6a1f; }
  .msg.info { background: #f0f4ff; color: #1a4fa8; }
  .hint { font-size: var(--fs-xs); color: var(--c-text-mute); margin-top: 4px; }
  .goto-login {
    display: block; text-align: center; margin-top: 1.5rem;
    font-size: var(--fs-sm); color: #1a6fa8; text-decoration: none;
  }
  .goto-login:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">BioScan <span>Healthspan</span></div>
  <h1 id="title">Definir senha</h1>
  <div class="subtitle" id="subtitle">
    Você foi cadastrado como profissional da clínica. Defina sua senha para acessar o sistema.
  </div>

  <div id="form-section">
    <label for="pw1">Nova senha</label>
    <input type="password" id="pw1" autocomplete="new-password" placeholder="Mínimo 6 caracteres">
    <div class="hint">Use pelo menos 6 caracteres.</div>

    <label for="pw2">Confirmar senha</label>
    <input type="password" id="pw2" autocomplete="new-password" placeholder="Repita a senha">

    <button class="btn" id="submit-btn" onclick="submitReset()">Definir senha</button>
  </div>

  <div id="message"></div>
  <a href="/" class="goto-login" id="goto-login" style="display:none">Ir para login →</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const msgEl = document.getElementById('message');
const formEl = document.getElementById('form-section');
const gotoEl = document.getElementById('goto-login');

if (!token) {
  formEl.style.display = 'none';
  msgEl.innerHTML = '<div class="msg error">Link inválido: falta o token. Solicite um novo link ao administrador.</div>';
  gotoEl.style.display = 'block';
}

async function submitReset() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const btn = document.getElementById('submit-btn');

  if (!pw1 || pw1.length < 6) {
    msgEl.innerHTML = '<div class="msg error">Senha deve ter pelo menos 6 caracteres.</div>';
    return;
  }
  if (pw1 !== pw2) {
    msgEl.innerHTML = '<div class="msg error">As senhas não conferem.</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Salvando...';

  try {
    const res = await fetch('/bioscan/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pw1 })
    });

    // Pega o texto cru e tenta parsear como JSON
    const rawText = await res.text();
    let data;
    try {
      data = JSON.parse(rawText);
    } catch (parseErr) {
      // Servidor retornou HTML (provável 404/500) — mostra erro amigável
      console.error('Resposta não-JSON:', rawText.substring(0, 200));
      msgEl.innerHTML = `<div class="msg error">
        Erro ${res.status} no servidor. ${res.status === 404 ? 'Endpoint não encontrado — pode haver um deploy pendente.' :
        res.status === 500 ? 'Erro interno — verifique os logs do servidor.' :
        'O servidor retornou uma resposta inesperada.'}
      </div>`;
      btn.disabled = false;
      btn.textContent = 'Definir senha';
      return;
    }

    if (!res.ok) {
      msgEl.innerHTML = `<div class="msg error">${data.error || 'Erro ao definir senha'}</div>`;
      btn.disabled = false;
      btn.textContent = 'Definir senha';
      return;
    }

    formEl.style.display = 'none';
    msgEl.innerHTML = `<div class="msg success">
      ✓ Senha definida com sucesso!<br>
      Use o e-mail <strong>${data.email}</strong> para fazer login.
    </div>`;
    gotoEl.style.display = 'block';
  } catch (e) {
    msgEl.innerHTML = `<div class="msg error">Erro de conexão: ${e.message}</div>`;
    btn.disabled = false;
    btn.textContent = 'Definir senha';
  }
}

// Enter submete
document.getElementById('pw2').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') submitReset();
});
</script>

</body>
</html>
