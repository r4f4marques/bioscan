<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioScan Healthspan</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── DESIGN TOKENS ──────────────────────────────────────────────────── */
:root {
  /* Typography scale */
  --fs-xs:   12px;
  --fs-sm:   14px;
  --fs-base: 16px;
  --fs-lg:   18px;
  --fs-xl:   22px;
  --fs-2xl:  28px;
  --fs-3xl:  40px;

  /* Semantic colors */
  --c-bg:        #f5f4f0;
  --c-card:      #fff;
  --c-text:      #1a1a18;
  --c-text-sub:  #666;
  --c-text-mute: #999;
  --c-text-soft: #bbb;
  --c-border:    rgba(0,0,0,0.08);
  --c-hover:     #fafaf8;

  /* Spacing */
  --sidebar-w: 260px;
}

/* ── BASE ────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--c-bg);color:var(--c-text);font-size:var(--fs-base);line-height:1.5}

/* ── SIDEBAR ─────────────────────────────────────────────────────────── */
.sidebar{width:var(--sidebar-w);background:var(--c-card);border-right:1px solid var(--c-border);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:10;transition:transform .2s}
.logo{padding:1.4rem 1.25rem;font-size:var(--fs-lg);font-weight:600;border-bottom:1px solid var(--c-border);letter-spacing:-0.3px}
.logo span{font-weight:400;color:var(--c-text-soft)}
.nav{flex:1;padding:.5rem 0;overflow-y:auto}
.nav-section{font-size:var(--fs-xs);color:var(--c-text-soft);padding:1rem 1.25rem .4rem;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.nav-item{display:flex;align-items:center;gap:8px;padding:12px 1.25rem;cursor:pointer;font-size:var(--fs-sm);color:var(--c-text-sub);transition:all .1s}
.nav-item:hover,.nav-item.active{background:var(--c-bg);color:var(--c-text)}
.nav-item.active{font-weight:500}
.sidebar-footer{padding:1.2rem 1.25rem;border-top:1px solid var(--c-border);font-size:var(--fs-sm);color:var(--c-text-mute)}
.sidebar-footer strong{display:block;font-size:var(--fs-sm);color:var(--c-text);font-weight:500;margin-bottom:2px}
.logout{cursor:pointer;color:var(--c-text-soft);text-decoration:underline;font-size:var(--fs-xs);margin-top:6px;display:inline-block}

/* Mobile: sidebar vira overlay */
.sidebar-toggle{display:none;background:none;border:none;cursor:pointer;font-size:22px;padding:0;color:var(--c-text)}

/* ── MAIN ────────────────────────────────────────────────────────────── */
.main{margin-left:var(--sidebar-w);min-height:100vh}
.topbar{padding:1.1rem 1.75rem;border-bottom:1px solid var(--c-border);background:var(--c-card);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;gap:1rem;flex-wrap:wrap}
.topbar-title{font-size:var(--fs-lg);font-weight:600;letter-spacing:-0.3px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#topbar-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.content{padding:1.75rem;max-width:1400px}

/* ── GRIDS ───────────────────────────────────────────────────────────── */
.grid{display:grid;gap:14px;margin-bottom:1.5rem}
.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}

/* ── MCARD (cards de métrica) ───────────────────────────────────────── */
.mcard{background:var(--c-bg);border-radius:10px;padding:1.15rem 1.3rem;min-width:0}
.mcard-label{font-size:var(--fs-sm);color:var(--c-text-mute);margin-bottom:6px;font-weight:500}
.mcard-val{font-size:var(--fs-2xl);font-weight:600;line-height:1.1;letter-spacing:-0.5px;overflow-wrap:break-word}
.mcard-unit{font-size:var(--fs-base);font-weight:400;color:var(--c-text-mute);margin-left:4px}
.mcard-sub{font-size:var(--fs-xs);color:var(--c-text-soft);margin-top:6px}

/* ── BADGES ──────────────────────────────────────────────────────────── */
.badge{display:inline-block;font-size:var(--fs-xs);padding:3px 10px;border-radius:5px;font-weight:500;margin-top:6px}
.ok{background:#e8f5e0;color:#2d6a1f}
.warn{background:#fef3e0;color:#7a4f00}
.alert{background:#fde8e8;color:#9b1c1c}

/* ── CARDS GENÉRICOS ─────────────────────────────────────────────────── */
.card{background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:1.4rem 1.6rem;margin-bottom:1.25rem}
.card-title{font-size:var(--fs-base);font-weight:600;margin-bottom:1rem;letter-spacing:-0.2px}
.card-title small{font-size:var(--fs-xs);font-weight:400;color:var(--c-text-soft);margin-left:8px}

/* ── LISTA DE PACIENTES ──────────────────────────────────────────────── */
.pt-table{background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;overflow:hidden}
.pt-head{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 150px;padding:1rem 1.25rem;border-bottom:1px solid var(--c-border);font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.06em;color:var(--c-text-soft);font-weight:500}
.pt-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 150px;padding:1.1rem 1.25rem;border-bottom:1px solid rgba(0,0,0,0.05);align-items:center;cursor:pointer;transition:background .1s}
.pt-row:last-child{border-bottom:none}
.pt-row:hover{background:var(--c-hover)}
.pt-name{font-size:var(--fs-base);font-weight:500}
.pt-sub{font-size:var(--fs-xs);color:var(--c-text-mute);margin-top:3px}

/* ── BOTÕES ──────────────────────────────────────────────────────────── */
.btn{padding:9px 16px;border:1px solid rgba(0,0,0,0.12);border-radius:8px;background:var(--c-card);color:var(--c-text);font-size:var(--fs-sm);cursor:pointer;transition:all .1s;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--c-bg)}
.btn-primary{background:var(--c-text);color:var(--c-card);border-color:var(--c-text)}
.btn-primary:hover{opacity:.85}

/* ── UPLOAD ──────────────────────────────────────────────────────────── */
.upload-zone{border:1.5px dashed rgba(0,0,0,0.15);border-radius:10px;padding:2rem;text-align:center;cursor:pointer;background:var(--c-hover);transition:border-color .15s}
.upload-zone:hover{border-color:rgba(0,0,0,0.3)}

/* ── TABELA GENÉRICA (histórico, segmentos) ─────────────────────────── */
.table-wrap{overflow-x:auto;margin:0 -0.5rem}
.evo-tbl{width:100%;border-collapse:collapse;font-size:var(--fs-sm);min-width:500px}
.evo-tbl th{text-align:left;padding:.7rem 1rem;font-size:var(--fs-xs);color:var(--c-text-mute);font-weight:500;border-bottom:1px solid var(--c-border);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
.evo-tbl td{padding:.85rem 1rem;border-bottom:1px solid rgba(0,0,0,0.05)}
.evo-tbl tr:last-child td{border-bottom:none}

/* ── OUTROS ELEMENTOS ────────────────────────────────────────────────── */
.interpret-box{background:var(--c-bg);border-radius:10px;padding:1.3rem;font-size:var(--fs-sm);line-height:1.7;white-space:pre-wrap;max-height:450px;overflow-y:auto}
.age-row{display:flex;align-items:center;gap:20px;padding:.6rem 0}
.age-num{font-size:var(--fs-3xl);font-weight:600;line-height:1;letter-spacing:-1px}
.age-lbl{font-size:var(--fs-xs);color:var(--c-text-soft);margin-top:4px}
.loading{text-align:center;padding:3rem;color:var(--c-text-soft);font-size:var(--fs-sm)}

/* ── GRÁFICOS DE BARRAS (InBody-style) ──────────────────────────────── */
.hbar-group{padding:.6rem 0}
.hbar-row{display:grid;grid-template-columns:140px 1fr 100px;align-items:center;gap:14px;padding:.55rem 0}
.hbar-label{font-size:var(--fs-sm);color:var(--c-text-sub);font-weight:500}
.hbar-label-sub{font-size:var(--fs-xs);color:var(--c-text-soft);display:block;font-weight:400;margin-top:1px}
.hbar-track{position:relative;height:28px;display:flex;border-radius:6px;overflow:hidden;background:#f0efeb}
.hbar-zone{flex:1;display:flex;align-items:center;justify-content:center;font-size:var(--fs-xs);color:rgba(0,0,0,0.45);font-weight:500;position:relative}
.hbar-zone-low{background:#dde7f5}
.hbar-zone-normal{background:#c8e0b4}
.hbar-zone-high{background:#f5c9c4}
.hbar-marker{position:absolute;top:-3px;bottom:-3px;width:3px;background:#1a1a18;transform:translateX(-50%);border-radius:2px;z-index:2;box-shadow:0 0 0 2px rgba(255,255,255,0.85)}
.hbar-marker::after{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:#1a1a18;border-radius:50%;border:2px solid #fff}
.hbar-value{font-size:var(--fs-sm);font-weight:600;text-align:right;color:var(--c-text)}
.hbar-value-cls{font-size:var(--fs-xs);font-weight:400;color:var(--c-text-soft);display:block;margin-top:1px}
.hbar-legend{display:flex;gap:1rem;font-size:var(--fs-xs);color:var(--c-text-soft);padding:.4rem 0 .7rem;flex-wrap:wrap}
.hbar-legend-item{display:flex;align-items:center;gap:5px}
.hbar-legend-dot{width:10px;height:10px;border-radius:2px}
.hbar-link{position:absolute;border-top:2px dashed #888;opacity:0.5;pointer-events:none;z-index:1}

/* Responsivo: em mobile, label/value ficam acima da barra */
@media (max-width: 700px) {
  .hbar-row{grid-template-columns:1fr;gap:6px}
  .hbar-value{text-align:left}
}

/* ── FORMULÁRIOS ─────────────────────────────────────────────────────── */
.form-row{margin-bottom:1.1rem}
.form-row label{display:block;font-size:var(--fs-sm);color:var(--c-text-sub);margin-bottom:6px;font-weight:500}
.form-row label small{color:var(--c-text-soft);font-weight:400}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:8px;font-size:var(--fs-sm);color:var(--c-text);font-family:inherit;background:var(--c-card)}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:#555}

/* ── CAIXAS DE FEEDBACK ──────────────────────────────────────────────── */
.success-box{background:#e8f5e0;border-radius:8px;padding:1rem 1.3rem;font-size:var(--fs-sm);color:#2d6a1f;margin-top:1rem;line-height:1.5}
.info-box{background:#f0f4ff;border-radius:8px;padding:1rem 1.3rem;font-size:var(--fs-sm);color:#1a4fa8;margin-top:1rem;line-height:1.6}
.error-box{color:#c0392b;font-size:var(--fs-sm);padding:.85rem 1.15rem;background:#fde8e8;border-radius:8px;margin-top:.75rem;line-height:1.5}

/* ── CHARTS E DIAGRAMAS ──────────────────────────────────────────────── */
.chart-container{position:relative;height:240px;margin-top:.5rem}
.body-diagram{display:flex;justify-content:center;padding:1rem}
.body-diagram svg{max-width:240px;max-height:520px;width:100%;height:auto}

/* ── SILHUETA SEGMENTAL ──────────────────────────────────────────────── */
.sil-container{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;padding:.5rem 0}
.sil-col{display:flex;flex-direction:column;align-items:center}
.sil-title{font-size:var(--fs-sm);font-weight:500;margin-bottom:.8rem;color:var(--c-text)}
.sil-body{position:relative;width:100%;max-width:240px;aspect-ratio:240/420;margin:0 auto}
.sil-bg{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.35;filter:grayscale(1);pointer-events:none}
.sil-seg{position:absolute;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px;font-size:var(--fs-xs);line-height:1.25;text-align:center;opacity:0.9}
.sil-seg-name{font-weight:500;margin-bottom:3px}
.sil-seg-val{font-size:var(--fs-sm);font-weight:600}
.sil-legend{display:flex;gap:1rem;justify-content:center;font-size:var(--fs-xs);color:#888;margin-top:.8rem;flex-wrap:wrap}
.sil-legend-item{display:flex;align-items:center;gap:5px}
.sil-dot{width:12px;height:12px;border-radius:3px;opacity:.85}

/* ── LEGENDAS DO CORPO (body legacy) ─────────────────────────────────── */
.body-legend{display:flex;gap:1rem;justify-content:center;font-size:var(--fs-xs);color:#888;margin-top:1rem;flex-wrap:wrap}
.body-legend-item{display:flex;align-items:center;gap:5px}
.body-legend-dot{width:12px;height:12px;border-radius:3px}
.seg-label{font-size:var(--fs-xs);font-weight:500;fill:var(--c-text)}
.seg-label-sub{font-size:var(--fs-xs);fill:var(--c-text-sub)}
.body-toggle{display:flex;gap:0;margin-bottom:1rem;border:1px solid #eee;border-radius:8px;overflow:hidden;max-width:300px;margin-left:auto;margin-right:auto}

/* Overlay escuro quando sidebar aberta no mobile */
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9}
.sidebar-backdrop.active{display:block}

.body-toggle-btn{flex:1;padding:7px;font-size:var(--fs-sm);cursor:pointer;border:none;background:#f5f4f0;color:#999;transition:all .15s;font-family:inherit}
.body-toggle-btn.active{background:#1a1a18;color:#fff}

/* ═══════════════════════════════════════════════════════════════════════
   BREAKPOINT 1: Desktop médio (≤1100px)
   Grids de 4 colunas viram 2. Sidebar mantém tamanho.
   ═══════════════════════════════════════════════════════════════════════ */
@media (max-width: 1100px) {
  .grid-4{grid-template-columns:repeat(2,minmax(0,1fr))}
  .grid-3{grid-template-columns:repeat(2,minmax(0,1fr))}
}

/* ═══════════════════════════════════════════════════════════════════════
   BREAKPOINT 2: Tablet (≤900px)
   Sidebar mais estreita. Silhuetas em coluna única.
   ═══════════════════════════════════════════════════════════════════════ */
@media (max-width: 900px) {
  :root { --sidebar-w: 210px; }
  .sil-container{grid-template-columns:1fr;gap:2rem}
  .content{padding:1.25rem}
  .topbar{padding:.9rem 1.25rem}
  .pt-head,.pt-row{grid-template-columns:1.8fr 1fr 1fr 1fr 110px;font-size:var(--fs-sm)}
  .mcard-val{font-size:var(--fs-xl)}
}

/* ═══════════════════════════════════════════════════════════════════════
   BREAKPOINT 3: Mobile (≤700px)
   Sidebar vira overlay, tudo em 1 coluna, tabelas simplificadas.
   ═══════════════════════════════════════════════════════════════════════ */
@media (max-width: 700px) {
  .sidebar{transform:translateX(-100%);width:260px;transition:transform .2s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .sidebar-toggle{display:block}
  .topbar{padding:.85rem 1rem;gap:.6rem}
  .topbar-title{font-size:var(--fs-base)}
  #topbar-actions{display:flex;flex-wrap:wrap;gap:6px}
  .content{padding:1rem}
  .grid-4,.grid-3,.grid-2{grid-template-columns:1fr}
  .mcard-val{font-size:var(--fs-xl)}
  .card{padding:1.15rem 1.25rem}
  /* Tabela de pacientes colapsa — só mostra nome e ações */
  .pt-head{display:none}
  .pt-row{display:block;padding:1rem}
  .pt-row > div{margin-bottom:6px}
  .pt-row > div:last-child{display:flex;gap:6px;justify-content:flex-end;margin-top:10px}
  .age-num{font-size:var(--fs-2xl)}
  .btn{padding:8px 14px;font-size:var(--fs-sm)}
  .evo-tbl{font-size:var(--fs-sm)}
  .evo-tbl th,.evo-tbl td{padding:.5rem .6rem}
}
</style>
</head>
<body>

<div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar(false)"></div>

<div class="sidebar" id="sidebar">
  <div class="logo">BioScan <span>Healthspan</span></div>
  <div class="nav" id="sidebar-nav">
    <div class="nav-section">Clínica</div>
    <div class="nav-item active" id="nav-list" onclick="showScreen('list')">◈ Pacientes</div>
    <div class="nav-item" id="nav-new-patient" onclick="showScreen('new-patient')" style="display:none">+ Novo paciente</div>
    <div class="nav-item" id="nav-upload" onclick="showScreen('upload')" style="display:none">↑ Importar medição</div>
    <div class="nav-item" id="nav-users" onclick="showScreen('users')" style="display:none">◉ Profissionais</div>
    <div id="nav-patient-section" style="display:none">
      <div class="nav-section" id="nav-patient-name">Paciente</div>
      <div class="nav-item" id="nav-overview" onclick="showTab('overview')">○ Visão geral</div>
      <div class="nav-item" id="nav-evolution" onclick="showTab('evolution')">↗ Evolução</div>
      <div class="nav-item" id="nav-segments" onclick="showTab('segments')">◫ Segmental</div>
      <div class="nav-item" id="nav-comparative" onclick="showTab('comparative')">▤ Comparativo</div>
    </div>
  </div>
  <div class="sidebar-footer">
    <strong id="footer-name">—</strong>
    <span id="footer-role">—</span> · <span class="logout" onclick="logout()">Sair</span>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menu">☰</button>
    <div class="topbar-title" id="topbar-title">Carregando...</div>
    <div id="topbar-actions"></div>
  </div>
  <div class="content" id="content">
    <div class="loading">Carregando...</div>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('bioscan_token');
let user  = JSON.parse(localStorage.getItem('bioscan_user') || '{}');
let currentPatient = null;
let currentManufacturer = 'all';  // 'all', 'tanita', 'inbody', etc.
let isDoctor = false;
let isSecretary = false;
let isStaff = false;  // doctor ou secretary
let isAdmin = false;
let charts = {};

if (!token) window.location.href = '/';

isDoctor = user.role === 'doctor';
isSecretary = user.role === 'secretary';
isStaff = isDoctor || isSecretary;
isAdmin = !!user.is_admin;
document.getElementById('footer-name').textContent = user.name || user.email || '—';

// ── SIDEBAR (mobile) ──────────────────────────────────────────────────
function toggleSidebar(force) {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebar-backdrop');
  const open = force !== undefined ? force : !sb.classList.contains('open');
  sb.classList.toggle('open', open);
  bd.classList.toggle('active', open);
}

// Fecha a sidebar automaticamente quando um item é clicado em telas pequenas
document.getElementById('sidebar-nav').addEventListener('click', (e) => {
  if (e.target.classList.contains('nav-item') && window.innerWidth <= 600) {
    toggleSidebar(false);
  }
});
document.getElementById('footer-role').textContent =
  isAdmin ? 'Admin' :
  isDoctor ? 'Médico' :
  isSecretary ? 'Secretária' : 'Paciente';

if (isStaff) {
  document.getElementById('nav-new-patient').style.display = 'flex';
  document.getElementById('nav-upload').style.display = 'flex';
}

if (isAdmin) {
  document.getElementById('nav-users').style.display = 'flex';
}

async function api(method, path, body, isForm) {
  const opts = { method, headers: {'Authorization': 'Bearer ' + token} };
  if (body && !isForm) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  } else if (isForm) {
    opts.body = body;
  }
  const res = await fetch(API + path, opts);
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

function logout() {
  localStorage.removeItem('bioscan_token');
  localStorage.removeItem('bioscan_user');
  window.location.href = '/';
}

function setNav(id) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
}

function showScreen(screen) {
  destroyCharts();
  document.getElementById('nav-patient-section').style.display = 'none';
  document.getElementById('topbar-actions').innerHTML = '';
  currentPatient = null;

  if (screen === 'list') {
    setNav('nav-list');
    document.getElementById('topbar-title').textContent = 'Pacientes';
    if (isStaff) {
      document.getElementById('topbar-actions').innerHTML =
        '<button class="btn btn-primary" onclick="showScreen(\'new-patient\')">+ Novo paciente</button>';
    }
    loadPatients();
  } else if (screen === 'new-patient') {
    setNav('nav-new-patient');
    document.getElementById('topbar-title').textContent = 'Novo paciente';
    renderNewPatient();
  } else if (screen === 'upload') {
    setNav('nav-upload');
    document.getElementById('topbar-title').textContent = 'Importar medição';
    renderUpload();
  } else if (screen === 'users') {
    setNav('nav-users');
    document.getElementById('topbar-title').textContent = 'Profissionais';
    renderUsersScreen();
  }
}

function showPatient(p) {
  currentPatient = p;
  document.getElementById('nav-patient-section').style.display = 'block';
  document.getElementById('nav-patient-name').textContent = p.name.split(' ')[0];
  document.getElementById('topbar-title').textContent = p.name;
  document.getElementById('topbar-actions').innerHTML =
    '<button class="btn" onclick="showScreen(\'list\')">← Voltar</button> ' +
    (isStaff ? '<button class="btn" onclick="editPatient()">✎ Editar cadastro</button> <button class="btn" onclick="showAuditLog()">📋 Histórico de ações</button>' : '');
  showTab('overview');
}

function editPatient() {
  destroyCharts();
  setNav(null);
  document.getElementById('topbar-title').textContent = 'Editar cadastro';
  document.getElementById('topbar-actions').innerHTML =

function renderAuditLog(logs) {
  if (!logs.length) {

      <div style="text-align:center;padding:3rem;color:#bbb">
        <div style="font-size:28px;margin-bottom:1rem">📋</div>

      </div>`;
    return;
  }

  // Ícone e rótulo legível para cada tipo de ação
  const actionMeta = {
    'patient.create':          { icon: '✚',  label: 'Paciente cadastrado',     color: '#2d6a1f' },
    'patient.update':          { icon: '✎',  label: 'Cadastro editado',        color: '#1a6fa8' },
    'patient.delete':          { icon: '🗑',  label: 'Paciente excluído',       color: '#c0392b' },
    'measurement.create':      { icon: '➕',  label: 'Medição adicionada',      color: '#2d6a1f' },
    'measurement.update':      { icon: '✎',  label: 'Medição editada',         color: '#1a6fa8' },
    'measurement.delete':      { icon: '✕',  label: 'Medição excluída',        color: '#c0392b' },
    'measurement.import_csv':  { icon: '📄', label: 'CSV importado',           color: '#1a6fa8' },
    'measurement.import_pdf':  { icon: '📑', label: 'PDF importado',           color: '#16a085' },
    'measurement.import_file': { icon: '📑', label: 'Arquivo importado',       color: '#16a085' },
    'measurement.import_confirmed': { icon: '📑', label: 'Importação confirmada', color: '#16a085' },
    'user.create':             { icon: '✚',  label: 'Profissional cadastrado', color: '#2d6a1f' },
    'user.update':             { icon: '✎',  label: 'Profissional editado',    color: '#1a6fa8' },
    'user.reset_link':         { icon: '🔗', label: 'Link de senha gerado',    color: '#8e44ad' },
    'user.delete':             { icon: '🗑',  label: 'Profissional excluído',   color: '#c0392b' },
  };

  const formatDate = (iso) => {
    const d = new Date(iso);
    return d.toLocaleString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  };

  const formatDetails = (action, details) => {
    if (!details) return '';

    // Renderização customizada por tipo de ação
    if ((action === 'patient.update' || action === 'measurement.update') && details.changes) {
      const changes = Object.entries(details.changes).map(([field, vals]) => {
        const fmt = (v) => v == null || v === '' ? '(vazio)' : v;
        return `<div style="margin-top:4px"><strong>${field}:</strong> ${fmt(vals.from)} → ${fmt(vals.to)}</div>`;
      }).join('');
      return `<div style="font-size:var(--fs-sm);color:#666;margin-top:6px">${changes}</div>`;
    }

    if (action === 'patient.delete') {
      return `<div style="font-size:var(--fs-sm);color:#666;margin-top:6px">
        ${details.name || ''} ${details.cpf ? '· ' + details.cpf : ''}
        ${details.measurements_count ? ' · ' + details.measurements_count + ' medição(ões) removida(s)' : ''}
      </div>`;
    }

    if (action === 'measurement.delete') {
      const dt = details.measured_at ? new Date(details.measured_at).toLocaleDateString('pt-BR') : '';
      return `<div style="font-size:var(--fs-sm);color:#666;margin-top:6px">
        Medição de ${dt} (${details.source || '—'})
        ${details.weight ? ' · Peso ' + details.weight + 'kg' : ''}
        ${details.fat_pct ? ' · ' + details.fat_pct + '% gordura' : ''}
      </div>`;
    }

    if (action === 'measurement.import_pdf') {
      return `<div style="font-size:var(--fs-sm);color:#666;margin-top:6px">
        Fabricante: ${details.manufacturer || '—'}
        ${details.detected_name ? ' · Nome no PDF: ' + details.detected_name : ''}
      </div>`;
    }

    if (action === 'measurement.import_csv') {
      return `<div style="font-size:var(--fs-sm);color:#666;margin-top:6px">
        ${details.inserted || 0} inserida(s)${details.skipped ? ', ' + details.skipped + ' duplicata(s) ignorada(s)' : ''}
      </div>`;
    }

    // Fallback: mostra JSON compacto
    return `<div style="font-size:var(--fs-xs);color:#999;margin-top:6px;font-family:monospace">${JSON.stringify(details)}</div>`;
  };

  const rows = logs.map(log => {
    const meta = actionMeta[log.action] || { icon: '•', label: log.action, color: '#666' };
    return `
      <div style="padding:1rem;border-bottom:1px solid #f0f0f0">
        <div style="display:flex;align-items:flex-start;gap:12px">
          <div style="font-size:var(--fs-base);color:${meta.color};width:24px;text-align:center">${meta.icon}</div>
          <div style="flex:1">
            <div style="font-size:var(--fs-sm);font-weight:500;color:#1a1a18">${meta.label}</div>
            <div style="font-size:var(--fs-sm);color:#999;margin-top:2px">
              ${formatDate(log.timestamp)} · por <strong>${log.user_name || log.user_email || '—'}</strong>
            </div>
            ${formatDetails(log.action, log.details)}
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="card" style="padding:0">
      <div style="padding:1rem;border-bottom:1px solid #f0f0f0">
        <div class="card-title" style="margin:0">Histórico de ações (${logs.length})</div>
        <div style="font-size:var(--fs-sm);color:#999;margin-top:4px">Últimas 200 ações registradas para este paciente.</div>
      </div>
      ${rows}
    </div>`;
}

function showTab(tab) {

  });

  else if (tab === 'comparative') renderComparative();
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function fatStatus(v, sex) {
  if (sex === 'F') return v < 30 ? 'ok' : v < 35 ? 'warn' : 'alert';
  return v < 25 ? 'ok' : v < 30 ? 'warn' : 'alert';
}
function viscStatus(v) { return v <= 9 ? 'ok' : v <= 14 ? 'warn' : 'alert'; }
function metaStatus(v, age) { const d = v - age; return d <= 0 ? 'ok' : d <= 5 ? 'warn' : 'alert'; }
function bmiStatus(v) { return v < 25 ? 'ok' : v < 30 ? 'warn' : 'alert'; }
function bl(s) { return s === 'ok' ? 'Normal' : s === 'warn' ? 'Atenção' : 'Elevado'; }

// ── FILTRO POR FABRICANTE ─────────────────────────────────────────────────

// Detecta fabricante a partir do source da medição
function manufacturerOf(m) {
  const s = m.source || '';
  if (s.startsWith('tanita')) return 'tanita';
  if (s.startsWith('inbody')) return 'inbody';
  if (s === 'manual') return 'manual';
  return 'other';
}

// Retorna lista única de fabricantes presentes nas medições do paciente
function getManufacturers(patient) {
  const ms = patient.measurements || [];
  const set = new Set(ms.map(manufacturerOf));
  return Array.from(set);
}

// Retorna medições filtradas pelo fabricante atual
function getFilteredMeasurements(patient) {
  const ms = patient.measurements || [];
  if (currentManufacturer === 'all') return ms;
  return ms.filter(m => manufacturerOf(m) === currentManufacturer);
}

// Renderiza toggle de fabricante (só aparece se há 2+ fabricantes)
function renderManufacturerToggle(patient) {
  const manufs = getManufacturers(patient);
  if (manufs.length < 2) return '';

  const labels = {
    tanita: 'Tanita',
    inbody: 'InBody',
    manual: 'Manual',
    other: 'Outros',
  };

  const btn = (key, label) => `
    <button class="btn ${currentManufacturer === key ? 'btn-primary' : ''}"
            style="padding:6px 14px;font-size:var(--fs-sm)"
            onclick="setManufacturerFilter('${key}')">${label}</button>`;

  let buttons = btn('all', 'Todos');
  manufs.forEach(m => {
    buttons += btn(m, labels[m] || m);
  });

  const allNotice = currentManufacturer === 'all' ? `
    <div style="margin-top:8px;padding:8px 12px;background:#fef3e0;border-radius:6px;font-size:var(--fs-xs);color:#b07410;line-height:1.4">
      ⚠ Medições de fabricantes diferentes podem reportar parâmetros não-diretamente comparáveis (ex: massa magra vs. massa muscular esquelética). Selecione um fabricante específico para análise precisa.
    </div>` : '';

  return `
    <div style="margin-bottom:1rem">
      <div style="display:flex;gap:6px;flex-wrap:wrap">${buttons}</div>
      ${allNotice}
    </div>`;
}

function setManufacturerFilter(key) {
  currentManufacturer = key;
  // Re-renderiza a aba atual
  const activeTab = document.querySelector('.nav-item.active')?.id;
  if (activeTab === 'nav-overview')       showTab('overview');
  else if (activeTab === 'nav-evolution') showTab('evolution');
  else if (activeTab === 'nav-segments')  showTab('segments');
  else if (activeTab === 'nav-comparative') showTab('comparative');
}

// Formata uma data ISO (YYYY-MM-DD ou YYYY-MM-DDTHH:MM:SS...) para DD/MM/YYYY
function fmtDateBR(iso) {
  if (!iso) return '—';
  const datePart = iso.substring(0, 10);
  const [y, m, d] = datePart.split('-');
  if (!y || !m || !d) return datePart;
  return `${d}/${m}/${y}`;
}

// ── MÁSCARAS ──────────────────────────────────────────────────────────────
function maskCPF(v) {
  v = v.replace(/\D/g,'').slice(0,11);
  if (v.length > 9)      return v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2}).*/, '$1.$2.$3-$4');
  else if (v.length > 6) return v.replace(/(\d{3})(\d{3})(\d{1,3}).*/, '$1.$2.$3');
  else if (v.length > 3) return v.replace(/(\d{3})(\d{1,3}).*/, '$1.$2');
  return v;
}
function maskPhone(v) {
  v = v.replace(/\D/g,'').slice(0,11);
  if (v.length > 10)     return v.replace(/(\d{2})(\d{5})(\d{1,4}).*/, '($1) $2-$3');
  else if (v.length > 6) return v.replace(/(\d{2})(\d{4,5})(\d{1,4}).*/, '($1) $2-$3');
  else if (v.length > 2) return v.replace(/(\d{2})(\d{1,5}).*/, '($1) $2');
  else if (v.length > 0) return v.replace(/(\d{1,2}).*/, '($1');
  return v;
}

// ── PATIENTS LIST ─────────────────────────────────────────────────────────
async function loadPatients() {
  document.getElementById('content').innerHTML = '<div class="loading">Carregando...</div>';

  if (!isStaff) {
    const pid = user.patient_id;
    if (!pid) {
      document.getElementById('content').innerHTML = '<div class="loading">Perfil não encontrado.</div>';
      return;
    }
    const p = await api('GET', `/bioscan/patients/${pid}`);
    if (p) showPatient(p);
    return;
  }

  const patients = await api('GET', '/bioscan/patients');
  if (!patients) return;

  if (!patients.length) {
    document.getElementById('content').innerHTML = `
      <div style="text-align:center;padding:3rem;color:#bbb">
        <div style="font-size:32px;margin-bottom:1rem">◈</div>
        <div style="font-size:var(--fs-sm);margin-bottom:1rem">Nenhum paciente cadastrado</div>
        <button class="btn btn-primary" onclick="showScreen('new-patient')">+ Cadastrar primeiro paciente</button>
      </div>`;
    return;
  }

  // Guarda a lista completa para filtro client-side
  window._allPatients = patients;

  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:1rem">
      <input type="text" id="pt-search" placeholder="Buscar por nome ou CPF..."
             style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:var(--fs-sm);color:#1a1a18"
             oninput="filterPatients(this.value)"
             autocomplete="off">
    </div>
    <div id="pt-list"></div>`;

  renderPatientList(patients);
}

function filterPatients(query) {
  const all = window._allPatients || [];
  const q = query.toLowerCase().trim();

  if (!q) {
    renderPatientList(all);
    return;
  }

  // Remove formatação do CPF para busca: "123.456.789-00" → "12345678900"
  const qDigits = q.replace(/\D/g, '');

  const filtered = all.filter(p => {
    const nameMatch = p.name.toLowerCase().includes(q);
    const cpfMatch = qDigits && p.cpf && p.cpf.replace(/\D/g, '').includes(qDigits);
    return nameMatch || cpfMatch;
  });

  renderPatientList(filtered);
}

function renderPatientList(patients) {
  const container = document.getElementById('pt-list');
  if (!container) return;

  if (!patients.length) {
    container.innerHTML = '<div style="text-align:center;padding:2rem;color:#bbb;font-size:var(--fs-sm)">Nenhum paciente encontrado.</div>';
    return;
  }

  const rows = patients.map(p => {
    const l = p.latest || {};
    return `<div class="pt-row" onclick="selectPatient(${p.id})">
      <div><div class="pt-name">${p.name}</div><div class="pt-sub">${p.age ? p.age + 'a' : '—'} · ${p.sex === 'M' ? 'Masc' : p.sex === 'F' ? 'Fem' : '—'} ${p.cpf ? '· ' + p.cpf : ''}</div></div>
      <div>${l.bmi ? `<span class="badge ${bmiStatus(l.bmi)}">${l.bmi.toFixed(1)}</span>` : '—'}</div>
      <div>${l.fat_pct !== undefined ? `<span class="badge ${fatStatus(l.fat_pct, p.sex)}">${l.fat_pct.toFixed(1)}%</span>` : '—'}</div>
      <div>${l.visceral !== undefined ? `<span class="badge ${viscStatus(l.visceral)}">${l.visceral}</span>` : '—'}</div>
      <div style="display:flex;gap:4px;justify-content:flex-end" onclick="event.stopPropagation()">
        <button class="btn" onclick="selectPatient(${p.id})">Ver →</button>
        ${isDoctor ? `<button class="btn" style="color:#c0392b" onclick="deletePatient(${p.id}, '${p.name.replace(/'/g, "\\'")}')">✕</button>` : ''}
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `
    <div class="pt-table">
      <div class="pt-head"><div>Paciente (${patients.length})</div><div>IMC</div><div>Gordura</div><div>Visceral</div><div></div></div>
      ${rows}
    </div>`;
}

async function deletePatient(id, name) {
  if (!confirm(`Excluir ${name}?\n\nTodas as medições serão removidas permanentemente. Esta ação não pode ser desfeita.`)) {
    return;
  }
  const result = await api('DELETE', `/bioscan/patients/${id}`);
  if (result && !result.error) {
    loadPatients();
  } else {
    alert('Erro ao excluir: ' + (result?.error || 'desconhecido'));
  }
}

async function selectPatient(id) {
  currentManufacturer = 'all';  // reseta filtro ao mudar de paciente
  evoVisible = { weight: true, fat: true, muscle: true, visceral: false, meta: false, bmr: false };  // reset toggles
  const data = await api('GET', `/bioscan/patients/${id}`);
  if (data) showPatient(data);
}

async function createPatient() {
  const result = document.getElementById('np-result');
  const name   = document.getElementById('np-name').value.trim();
  const cpf    = document.getElementById('np-cpf').value.trim();
  const phone  = document.getElementById('np-phone').value.trim();
  const email  = document.getElementById('np-email').value.trim();
  const birth  = document.getElementById('np-birth').value;

  if (!name || !email || !birth || !cpf) {
    result.innerHTML = '<div class="error-box">Preencha nome, CPF, e-mail e data de nascimento.</div>';
    return;
  }

  result.innerHTML = '<div style="color:#999;font-size:var(--fs-sm);margin-top:.5rem">Cadastrando...</div>';

  const data = await api('POST', '/bioscan/patients', {
    name, email, cpf, phone: phone || null,
    birth_date: birth,
    sex:        document.getElementById('np-sex').value || null,
    height_cm:  parseFloat(document.getElementById('np-height').value) || null,
    notes:      document.getElementById('np-notes').value || null,
  });

  if (!data) return;

  if (data.error) {
    result.innerHTML = `<div class="error-box">${data.error}</div>`;
  } else {
    result.innerHTML = `
      <div class="success-box">✓ Paciente cadastrado com sucesso!</div>
      <div class="info-box">
        <strong>Credenciais de acesso do paciente:</strong><br>
        E-mail: <strong>${data.user.email}</strong><br>
        Data de nascimento: <strong>${birth}</strong><br>
        URL: <strong>bioscan.tridash.fit</strong>
      </div>`;
  }
}

async function savePatient(id) {
  const result = document.getElementById('np-result');
  const name  = document.getElementById('np-name').value.trim();
  const cpf   = document.getElementById('np-cpf').value.trim();
  const phone = document.getElementById('np-phone').value.trim();
  const birth = document.getElementById('np-birth').value;

  if (!name || !cpf) {
    result.innerHTML = '<div class="error-box">Nome e CPF são obrigatórios.</div>';
    return;
  }

  result.innerHTML = '<div style="color:#999;font-size:var(--fs-sm);margin-top:.5rem">Salvando...</div>';

  const payload = {
    name, cpf,
    phone: phone || null,
    sex:       document.getElementById('np-sex').value || null,
    height_cm: parseFloat(document.getElementById('np-height').value) || null,
    notes:     document.getElementById('np-notes').value || null,
  };
  if (birth) payload.birth_date = birth;

  const data = await api('PATCH', `/bioscan/patients/${id}`, payload);

  if (!data) return;

  if (data.error) {
    result.innerHTML = `<div class="error-box">${data.error}</div>`;
  } else {
    result.innerHTML = '<div class="success-box">✓ Cadastro atualizado com sucesso!</div>';
    // Recarregar paciente atualizado e voltar para a visão geral
    setTimeout(async () => {
      const fresh = await api('GET', `/bioscan/patients/${id}`);
      if (fresh) showPatient(fresh);
    }, 800);
  }
}

// Card secundário dinâmico: mostra 4 campos mais relevantes disponíveis

function renderMuscleOrFFMCard(m) {

    return `<div class="mcard">
      <div class="mcard-label">Massa muscular</div>
      <div class="mcard-val">${m.muscle_kg.toFixed(1)}<span class="mcard-unit">kg</span></div>

    </div>`;
  }
  // Prioridade 2: ffm_kg (Tanita reporta massa magra total)
  if (m.ffm_kg != null) {
    return `<div class="mcard">
      <div class="mcard-label">Massa magra</div>
      <div class="mcard-val">${m.ffm_kg.toFixed(1)}<span class="mcard-unit">kg</span></div>
      <div class="mcard-sub">${m.muscle_quality != null ? 'Qualidade musc.: ' + m.muscle_quality : 'Músculo + água + órgãos'}</div>

  return `<div class="mcard">
    <div class="mcard-label">Massa muscular</div>
    <div class="mcard-val">—</div>

}

// Card resumo em linguagem leiga para paciente (sem IA, sem jargão técnico)
function renderPatientFriendlyCard(m, p) {
  const items = [];

  // Peso + IMC
  if (m.weight && m.bmi) {
    const bmiSt = bmiStatus(m.bmi);
    const msg = bmiSt === 'ok' ? 'Seu peso está na <strong>faixa ideal</strong> para sua altura.'
              : bmiSt === 'warn' ? 'Seu peso está <strong>um pouco acima</strong> do ideal — sobrepeso leve.'
              : 'Seu peso está <strong>acima do ideal</strong>. Converse com seu médico sobre um plano.';
    items.push({ icon: '⚖️', msg });
  }

  // Gordura corporal
  if (m.fat_pct != null) {
    const st = fatStatus(m.fat_pct, p.sex);
    const msg = st === 'ok' ? 'Seu percentual de gordura corporal está <strong>saudável</strong>.'
              : st === 'warn' ? 'Seu percentual de gordura está <strong>um pouco acima</strong> do recomendado.'
              : 'Seu percentual de gordura está <strong>elevado</strong>. Atividade física e alimentação podem ajudar.';
    items.push({ icon: '🔥', msg });
  }

  // Visceral
  if (m.visceral != null) {
    const st = viscStatus(m.visceral);
    const msg = st === 'ok' ? 'Sua gordura visceral (ao redor dos órgãos) está em <strong>nível saudável</strong>.'
              : st === 'warn' ? 'Sua gordura visceral está <strong>em alerta</strong>. Vale reduzir abdômen com exercícios.'
              : 'Sua gordura visceral está <strong>alta</strong>. Importante consultar seu médico.';
    items.push({ icon: '❤️', msg });
  }

  // Água
  if (m.water_pct != null) {
    if (m.water_pct < 50) {
      items.push({ icon: '💧', msg: 'Sua hidratação corporal está <strong>baixa</strong>. Beba mais água ao longo do dia.' });
    } else if (m.water_pct <= 65) {
      items.push({ icon: '💧', msg: 'Sua hidratação corporal está <strong>boa</strong>.' });
    }
  }

  const itemsHTML = items.map(it => `
    <div style="display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid #f0f0f0">
      <div style="font-size:18px">${it.icon}</div>
      <div style="font-size:var(--fs-sm);line-height:1.5;color:#333">${it.msg}</div>
    </div>`).join('');

  return `
    <div class="card">
      <div class="card-title">Seu resumo</div>
      ${itemsHTML || '<div style="color:#999;font-size:var(--fs-sm)">Dados insuficientes para gerar resumo.</div>'}
      <div style="margin-top:1rem;padding:10px 12px;background:#f0f4ff;border-radius:6px;font-size:var(--fs-xs);color:#1a4fa8;line-height:1.5">
        Este resumo é uma orientação geral. Para interpretação clínica detalhada, consulte seu médico.
      </div>
    </div>`;
}

// Card de comparação destacada com medição anterior
function renderComparisonCard(curr, prev, p) {
  const prevDate = fmtDateBR(prev.measured_at);
  const currDate = fmtDateBR(curr.measured_at);

  const changes = [];

  const addChange = (label, oldVal, newVal, unit, decimals, betterIs) => {
    if (oldVal == null || newVal == null) return;
    const delta = newVal - oldVal;
    if (Math.abs(delta) < 0.01) return;
    const absD = Math.abs(delta).toFixed(decimals);
    const sign = delta > 0 ? '+' : '−';
    // Determina se a variação é favorável
    let color = '#666';
    let emoji = '→';
    if (betterIs === 'less') {
      color = delta < 0 ? '#2d6a1f' : '#c0392b';
      emoji = delta < 0 ? '↓' : '↑';
    } else if (betterIs === 'more') {
      color = delta > 0 ? '#2d6a1f' : '#c0392b';
      emoji = delta > 0 ? '↑' : '↓';
    }
    changes.push({
      label, oldVal, newVal, sign, absD, unit, color, emoji, decimals,
    });
  };

  addChange('Peso',           prev.weight,   curr.weight,   'kg', 1, null);
  addChange('Gordura',        prev.fat_pct,  curr.fat_pct,  '%',  1, 'less');
  addChange('Músculo',        prev.muscle_kg ?? prev.ffm_kg, curr.muscle_kg ?? curr.ffm_kg, 'kg', 1, 'more');
  addChange('Visceral',       prev.visceral, curr.visceral, '',   0, 'less');

  if (!changes.length) return '';

  const cards = changes.map(c => `
    <div style="flex:1;min-width:140px;padding:1rem;background:#fafaf8;border-radius:8px">
      <div style="font-size:var(--fs-xs);color:#999;margin-bottom:4px">${c.label}</div>
      <div style="font-size:var(--fs-base);font-weight:500;color:${c.color}">
        ${c.emoji} ${c.sign}${c.absD}${c.unit}
      </div>
      <div style="font-size:var(--fs-xs);color:#666;margin-top:4px">
        ${c.oldVal.toFixed(c.decimals)}${c.unit} → ${c.newVal.toFixed(c.decimals)}${c.unit}
      </div>
    </div>`).join('');

  return `
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Variação desde a medição anterior <small>${prevDate} → ${currDate}</small></div>
      <div style="display:flex;flex-wrap:wrap;gap:10px">
        ${cards}
      </div>
    </div>`;
}

// Card principal: mostra Idade metabólica (Tanita) OU Pontuação InBody (fallback)
function renderAgeOrScoreCard(m, p) {
  const age = p.age ?? '—';
  const flagsHtml = (p.risk_flags || []).map(
    f => `<div class="badge ${f.level}" style="display:block;margin-bottom:4px;padding:4px 8px">${f.message}</div>`
  ).join('');

  // Prioridade 1: idade metabólica (se disponível)
  if (m.meta_age != null) {
    const metaDiff = p.age != null ? m.meta_age - p.age : null;
    const metaColor = metaDiff === null ? '#bbb' : metaDiff < 0 ? '#2d6a1f' : metaDiff <= 5 ? '#1a6fa8' : '#9b1c1c';
    return `
      <div class="card">
        <div class="card-title">Idade metabólica vs. real</div>
        <div class="age-row">
          <div><div class="age-num" style="color:#bbb">${age}</div><div class="age-lbl">Idade real</div></div>
          <div style="font-size:20px;color:#ddd">→</div>
          <div><div class="age-num" style="color:${metaColor}">${m.meta_age}</div><div class="age-lbl">Metabólica</div></div>
        </div>
        <div style="margin-top:1rem">${flagsHtml}</div>
      </div>`;
  }

  // Prioridade 2: Pontuação InBody (se disponível)
  if (m.inbody_score != null) {
    // Cor baseada no score: <70 alerta, 70-80 ok, >80 ótimo
    const score = m.inbody_score;
    const scoreColor = score >= 80 ? '#2d6a1f' : score >= 70 ? '#1a6fa8' : score >= 60 ? '#b07410' : '#9b1c1c';
    const scoreLabel = score >= 80 ? 'Excelente' : score >= 70 ? 'Bom' : score >= 60 ? 'Regular' : 'Atenção';
    return `
      <div class="card">
        <div class="card-title">Pontuação InBody <small>avaliação global</small></div>
        <div style="display:flex;align-items:center;gap:1.5rem;padding:.5rem 0">
          <div>
            <div class="age-num" style="color:${scoreColor}">${score}</div>
            <div class="age-lbl">de 100</div>
          </div>
          <div style="flex:1">
            <div style="font-size:var(--fs-base);font-weight:500;color:${scoreColor};margin-bottom:4px">${scoreLabel}</div>
            <div style="font-size:var(--fs-sm);color:#666;line-height:1.5">
              Pontuação geral da composição corporal. Valores acima de 80 indicam corpo atlético/ótimo; 70-80 normal; abaixo de 70 merece atenção.
            </div>
          </div>
        </div>
        <div style="margin-top:1rem">${flagsHtml}</div>
      </div>`;
  }

  // Fallback: card simples só com alertas se nenhuma métrica está disponível
  return `
    <div class="card">
      <div class="card-title">Avaliação geral</div>
      <div style="font-size:var(--fs-sm);color:#999;padding:.5rem 0">
        Métricas de avaliação global (idade metabólica ou pontuação) não disponíveis nesta medição.
      </div>
      <div style="margin-top:1rem">${flagsHtml}</div>
    </div>`;
}

function renderSecondaryCards(m) {
  const fmt = (v, dec = 1) => v == null ? '—' : v.toFixed(dec);
  const fmtInt = (v) => v == null ? '—' : Math.round(v);

  // Lista de candidatos em ordem de prioridade; filtramos os que têm valor
  const candidates = [
    m.water_pct != null && {
      label: 'Água corporal',
      val: fmt(m.water_pct, 1), unit: '%'
    },
    m.bmr != null && {
      label: 'Metabolismo basal',
      val: fmt(m.bmr, 0), unit: 'kcal'
    },
    m.smi != null && {
      label: 'SMI',
      val: fmt(m.smi, 2), unit: 'kg/m²',
      sub: 'Índice de massa esquelética'
    },
    m.waist_hip_ratio != null && {
      label: 'Cintura/quadril',
      val: fmt(m.waist_hip_ratio, 2), unit: ''
    },
    m.obesity_degree != null && {
      label: 'Grau de obesidade',
      val: fmtInt(m.obesity_degree), unit: '%'
    },
    m.ffm_kg != null && {
      label: 'Massa livre de gordura',
      val: fmt(m.ffm_kg, 1), unit: 'kg'
    },
    m.protein_kg != null && {
      label: 'Proteína',
      val: fmt(m.protein_kg, 2), unit: 'kg'
    },
    m.mineral_kg != null && {
      label: 'Minerais',
      val: fmt(m.mineral_kg, 2), unit: 'kg'
    },
    m.bone_kg != null && {
      label: 'Massa óssea',
      val: fmt(m.bone_kg, 2), unit: 'kg'
    },
    m.recommended_kcal != null && {
      label: 'Ingestão recomendada',
      val: fmtInt(m.recommended_kcal), unit: 'kcal'
    },
    m.heart_rate != null && m.heart_rate > 0 && {
      label: 'FC repouso',
      val: m.heart_rate, unit: 'bpm'
    },
  ].filter(Boolean);

  // Pega os 4 primeiros disponíveis
  const top4 = candidates.slice(0, 4);

  if (!top4.length) {
    return '<div class="mcard" style="grid-column:span 4;color:#bbb;text-align:center">Sem dados adicionais</div>';
  }

  return top4.map(c => `
    <div class="mcard">
      <div class="mcard-label">${c.label}</div>
      <div class="mcard-val">${c.val}<span class="mcard-unit">${c.unit}</span></div>
      ${c.sub ? `<div class="mcard-sub">${c.sub}</div>` : ''}
    </div>`).join('');
}

async function getInterpretation() {
  const box = document.getElementById('interpret-box');
  box.textContent = 'Analisando dados com IA...';
  box.style.color = '#bbb';
  box.style.fontStyle = 'italic';
  const data = await api('POST', `/bioscan/patients/${currentPatient.id}/interpret`);
  if (data && data.interpretation) {
    box.textContent = data.interpretation;
    box.style.color = '#1a1a18';
    box.style.fontStyle = 'normal';
  } else {
    box.textContent = data?.error || 'Erro ao gerar interpretação.';
  }
}

async function downloadReport() {
  const btn = event.target;
  const originalText = btn.textContent;
  btn.textContent = 'Gerando PDF...';
  btn.disabled = true;

  try {
    const res = await fetch(`/bioscan/patients/${currentPatient.id}/report`, {
      headers: {'Authorization': 'Bearer ' + token}
    });

    if (res.status === 401) { logout(); return; }

    if (!res.ok) {
      const err = await res.json().catch(() => ({error: 'Erro desconhecido'}));
      alert('Erro ao gerar relatório: ' + (err.error || res.statusText));
      return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;

    // Pega o filename do header Content-Disposition
    const disposition = res.headers.get('Content-Disposition') || '';
    const match = disposition.match(/filename=([^;]+)/);
    a.download = match ? match[1].replace(/"/g, '').trim()
                       : `BioScan_${currentPatient.name}.pdf`;

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('Erro ao baixar relatório: ' + e.message);
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

/**
 * Faixas de referência por idade e sexo.
 * Baseado em ACSM / OMS / Pollock (homens 40-59, referências clínicas).
 */
function getReferenceBands(patient) {
  const sex = patient.sex;
  const age = patient.age ?? 40;  // fallback para 40 se idade ausente

  // % GORDURA (baseado em ACSM/OMS)
  let fatMin, fatMax;
  if (sex === 'F') {
    if (age < 40)      { fatMin = 21; fatMax = 33; }
    else if (age < 60) { fatMin = 23; fatMax = 34; }
    else               { fatMin = 24; fatMax = 36; }
  } else {
    // Masculino ou não informado (usa masculino como padrão)
    if (age < 40)      { fatMin = 8;  fatMax = 19; }
    else if (age < 60) { fatMin = 11; fatMax = 22; }
    else               { fatMin = 13; fatMax = 25; }
  }

  // IMC (OMS — universal)
  const bmiMin = 18.5;
  const bmiMax = 24.9;

  return { fatMin, fatMax, bmiMin, bmiMax, sex, age };
}

/**
 * Gera uma barra horizontal "Abaixo / Normal / Acima" com marcador do paciente.
 */
function renderRangeBar(value, rangeMin, rangeMax, unit = '', label = '') {
  if (value == null) {
    return `<div style="padding:1rem;color:#bbb;font-size:var(--fs-sm);text-align:center">—</div>`;
  }

  // ZONAS FIXAS: abaixo 0-30%, normal 30-60%, acima 60-100% (para alinhamento visual)
  const ZONE_LOW  = 30;
  const ZONE_HIGH = 60;

  // Posição do marcador dentro da zona apropriada
  let markerPos;
  if (value < rangeMin) {
    // Zona "abaixo" (0-30%): interpolado de 0 até ZONE_LOW
    const range = rangeMin;       // de 0 a rangeMin
    const t = Math.max(0, value) / range;
    markerPos = t * ZONE_LOW;
  } else if (value <= rangeMax) {
    // Zona "normal" (30-60%): interpolado de ZONE_LOW até ZONE_HIGH
    const t = (value - rangeMin) / (rangeMax - rangeMin);
    markerPos = ZONE_LOW + t * (ZONE_HIGH - ZONE_LOW);
  } else {
    // Zona "acima" (60-100%): interpolado de ZONE_HIGH até 100
    // Consideramos que "100%" corresponde a rangeMax * 2 (dobro do limite)
    const extent = rangeMax;      // faixa acima do normal
    const t = Math.min(1, (value - rangeMax) / extent);
    markerPos = ZONE_HIGH + t * (100 - ZONE_HIGH);
  }

  // Classificação
  let status, statusColor;
  if (value < rangeMin) { status = 'Abaixo';  statusColor = '#1a6fa8'; }
  else if (value <= rangeMax) { status = 'Normal'; statusColor = '#2d6a1f'; }
  else { status = 'Acima'; statusColor = '#c0392b'; }

  return `
    <div style="margin:12px 0">
      ${label ? `<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <span style="font-size:var(--fs-sm);font-weight:500">${label}</span>
        <span style="font-size:var(--fs-sm);color:${statusColor};font-weight:600">
          ${value.toFixed(1)}${unit}
          <span style="font-size:var(--fs-xs);margin-left:6px;padding:2px 8px;border-radius:4px;background:${statusColor}15">${status}</span>
        </span>
      </div>` : ''}

        #e8a89b ${ZONE_HIGH}%,
        #e8a89b 100%
      )">

      </div>

        <span style="position:absolute;left:${(ZONE_HIGH + 100)/2}%;transform:translateX(-50%)">Acima</span>
      </div>
    </div>`;
}

/**
 * Gráfico Músculo-Gordura (Peso / Massa Muscular / Massa de Gordura).
 * Inspirado no InBody mas com faixas mais clínicas.
 */
function renderMuscleFatBars(m, patient) {
  const ref = getReferenceBands(patient);

  // Para peso: usa IMC como referência (peso ideal = IMC 18.5-25 × altura²)
  const h_m = patient.height_cm ? patient.height_cm / 100 : null;
  let weightMin = null, weightMax = null;
  if (h_m) {
    weightMin = ref.bmiMin * h_m * h_m;
    weightMax = ref.bmiMax * h_m * h_m;
  }

  // Decide o que mostrar: músculo esquelético (InBody) ou massa magra (Tanita)
  // Faixas de referência diferentes para cada conceito
  let muscVal = null, muscMin = null, muscMax = null, muscLabel = 'Massa muscular';
  if (m.muscle_kg != null && m.weight) {
    // InBody: músculo esquelético é ~35-48% do peso em homens, ~28-42% em mulheres
    muscVal = m.muscle_kg;
    muscLabel = 'Massa muscular (esquelética)';
    if (patient.sex === 'F') {
      muscMin = m.weight * 0.28;
      muscMax = m.weight * 0.42;
    } else {
      muscMin = m.weight * 0.35;
      muscMax = m.weight * 0.48;
    }
  } else if (m.ffm_kg != null && m.weight) {
    // Tanita: massa magra total é ~70-80% do peso em homens magros, ~60-75% em mulheres
    // A faixa é na verdade "(1 - %gordura_ideal)" × peso
    muscVal = m.ffm_kg;
    muscLabel = 'Massa magra';
    const fatMinDecimal = ref.fatMin / 100;
    const fatMaxDecimal = ref.fatMax / 100;
    muscMin = m.weight * (1 - fatMaxDecimal);
    muscMax = m.weight * (1 - fatMinDecimal);
  }

  // Para massa de gordura: peso × fatPct_faixa
  let fatKgMin = null, fatKgMax = null;
  if (m.weight) {
    fatKgMin = m.weight * ref.fatMin / 100;
    fatKgMax = m.weight * ref.fatMax / 100;
  }

  const fatKg = (m.weight && m.fat_pct) ? m.weight * m.fat_pct / 100 : null;

  return `
    ${weightMin != null
      ? renderRangeBar(m.weight, weightMin, weightMax, ' kg', 'Peso')
      : `<div style="padding:12px 0"><div style="font-size:var(--fs-sm);font-weight:500">Peso</div>
         <div style="font-size:var(--fs-sm);color:#999;margin-top:4px">Altura não informada — faixa indisponível</div></div>`}
    ${muscVal != null && muscMin != null
      ? renderRangeBar(muscVal, muscMin, muscMax, ' kg', muscLabel)
      : ''}
    ${fatKgMin != null
      ? renderRangeBar(fatKg, fatKgMin, fatKgMax, ' kg', 'Massa de gordura')
      : ''}
    <div style="margin-top:14px;padding-top:12px;border-top:1px solid #eee;font-size:var(--fs-xs);color:#999;line-height:1.5">
      Faixas baseadas em ACSM/OMS. ${patient.age != null ? `Ajustado para ${patient.age} anos, ${patient.sex === 'F' ? 'feminino' : 'masculino'}.` : 'Ajuste por idade indisponível.'}
    </div>`;
}

/**
 * Gráfico de Obesidade (IMC e % Gordura Corporal).
 */
function renderObesityBars(m, patient) {

  return `

function renderEvolutionChart(ms, patient) {
  // Renderiza os chips de toggle
  const chipsEl = document.getElementById('evo-chips');
  if (chipsEl) {
    chipsEl.innerHTML = EVO_SERIES.map(s => {
      // Detecta se há dados disponíveis para esta série
      const hasData = ms.some(m => s.getter(m) != null);
      if (!hasData) return '';

      const isOn = evoVisible[s.key];
      const style = isOn
        ? `border:1px solid ${s.color};background:${s.color};color:#fff`
        : `border:1px solid rgba(0,0,0,0.12);background:#fff;color:#999`;
      return `<button onclick="toggleEvoSeries('${s.key}')"
        style="padding:5px 12px;font-size:var(--fs-sm);border-radius:16px;cursor:pointer;${style}">
        ${isOn ? '●' : '○'} ${s.label}
      </button>`;
    }).join('');
  }

  // Detecta fabricantes presentes para legenda no rodapé
  const mfrs = Array.from(new Set(ms.map(manufacturerOf).filter(x => x !== 'other' && x !== 'manual')));
  const legendEl = document.getElementById('evo-legend-mfr');
  if (legendEl) {
    if (mfrs.length >= 2) {
      legendEl.innerHTML = mfrs.map(m =>
        m === 'tanita' ? '● Tanita' :
        m === 'inbody' ? '■ InBody' : `◆ ${m}`
      ).join(' &nbsp; ');
    } else {
      legendEl.innerHTML = '';
    }
  }

  // Legenda de referências no rodapé
  const captionEl = document.getElementById('evo-caption');
  if (captionEl) {
    const refNote = patient.age != null
      ? `Faixas de referência ACSM/OMS ajustadas para ${patient.age} anos, ${patient.sex === 'F' ? 'feminino' : 'masculino'}`
      : 'Faixas de referência (ajuste por idade indisponível)';
    captionEl.textContent = refNote + '. Clique nos chips para alternar séries.';
  }

  // Monta datasets
  const labels = ms.map(m => fmtDateBR(m.measured_at));
  const sources = ms.map(manufacturerOf);
  const makePointStyle = () => sources.map(s => s === 'inbody' ? 'rect' : 'circle');

  const activeSeries = EVO_SERIES.filter(s => evoVisible[s.key] && ms.some(m => s.getter(m) != null));

  const datasets = activeSeries.map(s => ({
    label: `${s.label}${s.unit ? ' (' + s.unit + ')' : ''}`,
    data: ms.map(s.getter),
    borderColor: s.color,
    backgroundColor: s.color + '15',
    yAxisID: s.axis,
    tension: 0.3,
    borderWidth: 2,
    pointRadius: 5,
    pointHoverRadius: 8,
    pointStyle: makePointStyle(),
    pointBackgroundColor: s.color,
    pointBorderColor: '#fff',
    pointBorderWidth: 2,
    spanGaps: true,
    _seriesKey: s.key,
    _unit: s.unit,
  }));

  // Plugin de faixas de referência (apenas para séries ativas com faixa definida)
  const refBandPlugin = {
    id: 'refBands',
    beforeDatasetsDraw(chart) {
      const { ctx, chartArea, scales } = chart;
      activeSeries.forEach(s => {
        const band = s.getRefBand(patient);
        if (!band) return;
        const scale = scales[s.axis];
        if (!scale) return;

        const yTop = scale.getPixelForValue(band.max);
        const yBot = scale.getPixelForValue(band.min);
        const [top, bot] = yTop < yBot ? [yTop, yBot] : [yBot, yTop];

        // Clip to chart area
        const y1 = Math.max(top, chartArea.top);
        const y2 = Math.min(bot, chartArea.bottom);
        if (y2 <= y1) return;

        // Faixa de fundo na cor da série (muito leve)
        ctx.fillStyle = s.color + '0d';  // ~5% alpha
        ctx.fillRect(chartArea.left, y1, chartArea.right - chartArea.left, y2 - y1);
      });
    }
  };

  // Cria/recria o chart
  const canvas = document.getElementById('ch-evolution');
  if (!canvas) return;

  if (charts['ch-evolution']) {
    charts['ch-evolution'].destroy();
  }

  // Quais eixos estão em uso?
  const usedAxes = new Set(activeSeries.map(s => s.axis));
  const scales = {
    x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#999' } },
  };
  if (usedAxes.has('yLeft')) {
    scales.yLeft = {
      type: 'linear', position: 'left',
      grid: { color: '#f0f0f0' },
      ticks: { font: { size: 11 }, color: '#999' },
      title: { display: true, text: activeSeries.find(s => s.axis === 'yLeft')?.unit || '', font: { size: 11 }, color: '#999' }
    };
  }
  if (usedAxes.has('yRight')) {
    scales.yRight = {
      type: 'linear', position: 'right',
      grid: { display: false },
      ticks: { font: { size: 11 }, color: '#999' },
      title: { display: true, text: '%', font: { size: 11 }, color: '#999' }
    };
  }

  charts['ch-evolution'] = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    plugins: [refBandPlugin],
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(26,26,24,0.96)',
          titleColor: '#fff', bodyColor: '#fff', padding: 10,
          titleFont: { size: 12, weight: '500' },
          bodyFont: { size: 13 },
          cornerRadius: 6, displayColors: true, boxPadding: 4,
          callbacks: {
            afterTitle: (items) => {
              const i = items[0].dataIndex;
              const src = sources[i];
              if (src === 'tanita') return '● Tanita';
              if (src === 'inbody') return '■ InBody';
              if (src === 'manual') return 'Entrada manual';
              return '';
            },
            label: (ctx) => {
              const ds = ctx.dataset;
              const v = ctx.parsed.y;
              if (v == null) return null;
              const decimals = ds._unit === 'kcal' || ds._seriesKey === 'meta' ? 0 : ds._seriesKey === 'muscle' ? 2 : 1;
              return `${ds.label}: ${v.toFixed(decimals)}`;
            }
          }
        }
      },
      scales
    }
  });
}

// Lê valor de uma medição considerando seg_fat (que usa o objeto seg_fat normalizado)
function getMeasurementValue(m, row) {
  if (row.useSegFat) {
    return m.seg_fat?.[row.useSegFat] ?? null;
  }
  return m[row.key] ?? null;
}

// Renderiza a célula com valor + indicador de variação vs medição anterior
function comparativeCellHTML(value, prevValue, row, patient) {
  if (value == null) {
    return '<span style="color:#bbb">—</span>';
  }
  const valStr = `${value.toFixed(row.decimals)}${row.unit ? ' ' + row.unit : ''}`;

  // Status badge se aplicável
  let badge = '';
  if (row.statusFn) {
    const st = row.statusFn(value, patient);
    if (st) {
      badge = ` <span class="badge ${st}" style="padding:1px 5px;font-size:10px">${bl(st)}</span>`;
    }
  }

  // Indicador de variação vs medição anterior
  let arrow = '';
  if (prevValue != null && row.betterIs) {
    const delta = value - prevValue;
    if (Math.abs(delta) >= Math.pow(10, -row.decimals) / 2) {
      const isBetter = (row.betterIs === 'more' && delta > 0) || (row.betterIs === 'less' && delta < 0);
      const color = isBetter ? '#2d6a1f' : '#c0392b';
      const symbol = delta > 0 ? '↑' : '↓';
      const absDelta = Math.abs(delta).toFixed(row.decimals);
      arrow = ` <span style="color:${color};font-size:11px;white-space:nowrap" title="Variação: ${delta > 0 ? '+' : '−'}${absDelta}">${symbol}${absDelta}</span>`;
    }
  } else if (prevValue != null && !row.betterIs) {
    // Sem direção "melhor", só mostra a variação em cinza
    const delta = value - prevValue;
    if (Math.abs(delta) >= Math.pow(10, -row.decimals) / 2) {
      const symbol = delta > 0 ? '↑' : '↓';
      const absDelta = Math.abs(delta).toFixed(row.decimals);
      arrow = ` <span style="color:#999;font-size:11px;white-space:nowrap">${symbol}${absDelta}</span>`;
    }
  }

  return `<span style="white-space:nowrap">${valStr}${badge}${arrow}</span>`;
}

function renderComparative() {
  const patient = currentPatient;
  const ms = getFilteredMeasurements(patient);

  if (!ms.length) {
    document.getElementById('content').innerHTML = renderManufacturerToggle(patient) +
      `<div class="loading">Nenhuma medição encontrada${currentManufacturer !== 'all' ? ' para este fabricante' : ''}.</div>`;

    document.getElementById('content').innerHTML = renderManufacturerToggle(patient) + `
      <div class="card" style="text-align:center;padding:2rem;color:#bbb">

      </div>`;
    return;
  }

  // Para cada grupo, filtra linhas que têm pelo menos 1 valor preenchido em alguma medição
  const visibleGroups = COMPARATIVE_GROUPS.map(group => {
    const visibleRows = group.rows.filter(row =>
      ms.some(m => getMeasurementValue(m, row) != null)
    );
    return { ...group, rows: visibleRows };
  }).filter(g => g.rows.length > 0);

  // Cabeçalho: 1 col fixa para parâmetro + N cols de medições (mais antiga → mais recente)
  const dateHeaders = ms.map(m => `
    <th style="text-align:right;padding:8px 10px;font-weight:500;color:#666;font-size:var(--fs-xs);white-space:nowrap;border-bottom:1px solid #e0e0e0">

      ${m.source ? `<div style="font-weight:400;color:#bbb;font-size:10px;margin-top:2px">${m.source}</div>` : ''}
    </th>
  `).join('');

  const groupsHTML = visibleGroups.map(group => {
    const rowsHTML = group.rows.map(row => {
      const cells = ms.map((m, i) => {
        const value = getMeasurementValue(m, row);
        const prev = i > 0 ? getMeasurementValue(ms[i - 1], row) : null;
        return `<td style="text-align:right;padding:8px 10px;font-size:var(--fs-sm);border-bottom:0.5px solid #f0f0f0">${comparativeCellHTML(value, prev, row, patient)}</td>`;
      }).join('');

      return `
        <tr>
          <td style="padding:8px 10px;font-size:var(--fs-sm);color:#333;border-bottom:0.5px solid #f0f0f0;white-space:nowrap">
            ${row.label}
          </td>
          ${cells}
        </tr>`;
    }).join('');

    return `
      <tr>
        <td colspan="${ms.length + 1}" style="padding:14px 10px 6px;font-size:var(--fs-sm);font-weight:600;color:#1a1a18;background:#fafaf8;border-top:1px solid #e0e0e0">
          ${group.title}
        </td>
      </tr>
      ${rowsHTML}`;
  }).join('');

  document.getElementById('content').innerHTML = renderManufacturerToggle(patient) + `
    <div class="card" style="overflow-x:auto;padding:0">
      <div style="padding:1rem 1.25rem;border-bottom:1px solid #e0e0e0">

        <div style="font-size:var(--fs-xs);color:#999;margin-top:6px">
          Setas verdes/vermelhas indicam melhora/piora vs medição anterior. Setas cinzas: variação sem direção definida.
        </div>

      <table style="width:100%;border-collapse:collapse;min-width:${300 + ms.length * 130}px">
        <thead>

              Parâmetro
            </th>

function renderBodyDual(m) {
  // Paleta músculo: verde claro (menor) → verde escuro (maior)
  const muscColor = (v, min, max) => {
    if (v == null) return '#eee';
    const t = max === min ? 0.5 : (v - min) / (max - min);
    const r = Math.round(192 - t * 89);
    const g = Math.round(221 - t * 68);
    const b = Math.round(151 - t * 117);
    return `rgb(${r},${g},${b})`;
  };

  // Paleta gordura: verde (normal) → laranja (atenção) → vermelho (elevado)
  const fatColor = (v) => {
    if (v == null) return '#eee';
    if (v < 25) return '#97c459';
    if (v < 32) return '#ef9f27';
    return '#e24b4a';
  };

  // Cor do texto adaptável
  const muscTextColor = (v, min, max) => {
    if (v == null) return '#666';
    const t = max === min ? 0.5 : (v - min) / (max - min);
    return t > 0.45 ? '#fff' : '#27500a';
  };
  const fatTextColor = (v) => {
    if (v == null) return '#666';
    if (v < 25) return '#2d5014';
    if (v < 32) return '#412402';
    return '#fff';
  };

  const mFat  = m.seg_fat;
  const mMus  = m.seg_musc;
  const musVals = Object.values(mMus).filter(v => v != null);
  const mMin = musVals.length ? Math.min(...musVals) : 0;
  const mMax = musVals.length ? Math.max(...musVals) : 1;

  const f = v => v == null ? '—' : v.toFixed(2);
  const fp = v => v == null ? '—' : v.toFixed(1);

  const segPositions = {
    right_arm: { style: 'left:8%;top:22%;width:22%;height:18%' },
    trunk:     { style: 'left:36%;top:30%;width:28%;height:28%' },
    left_arm:  { style: 'right:8%;top:22%;width:22%;height:18%' },
    right_leg: { style: 'left:8%;top:68%;width:22%;height:22%' },
    left_leg:  { style: 'right:8%;top:68%;width:22%;height:22%' },
  };

  const segLabels = {
    right_arm: 'Braço D',
    trunk:     'Tronco',
    left_arm:  'Braço E',
    right_leg: 'Perna D',
    left_leg:  'Perna E',
  };

  const renderCol = (title, data, colorFn, textFn, fmtFn, unit, legend) => {
    const segsHtml = Object.keys(segPositions).map(key => {
      const val = data[key];
      const isEmpty = val == null;
      const styleExtra = isEmpty
        ? 'border:1.5px dashed #ccc;background:transparent !important;opacity:0.6'
        : '';
      const nameText = isEmpty
        ? segLabels[key]
        : segLabels[key];
      const valText = isEmpty
        ? '<span style="font-style:italic;color:#999;font-size:var(--fs-xs)">não detectado</span>'
        : `${fmtFn(val)}${unit}`;
      return `<div class="sil-seg" style="${segPositions[key].style};background:${colorFn(val)};color:${textFn(val)};${styleExtra}">
        <div class="sil-seg-name">${nameText}</div>
        <div class="sil-seg-val">${valText}</div>
      </div>`;
    }).join('');

    return `
      <div class="sil-col">
        <div class="sil-title">${title}</div>
        <div class="sil-body">
          <svg class="sil-bg" viewBox="0 0 206.326 206.326" xmlns="http://www.w3.org/2000/svg">
            <path d="${SILHOUETTE_PATH}" fill="#000"/>
          </svg>
          ${segsHtml}
        </div>
        <div class="sil-legend">${legend}</div>
      </div>`;
  };

  const muscLegend = `
    <div class="sil-legend-item"><div class="sil-dot" style="background:#c0dd97"></div>Menor (${f(mMin)}kg)</div>
    <div class="sil-legend-item"><div class="sil-dot" style="background:#639922"></div>Maior (${f(mMax)}kg)</div>`;

  const fatLegend = `
    <div class="sil-legend-item"><div class="sil-dot" style="background:#97c459"></div>Normal</div>
    <div class="sil-legend-item"><div class="sil-dot" style="background:#ef9f27"></div>Atenção</div>
    <div class="sil-legend-item"><div class="sil-dot" style="background:#e24b4a"></div>Elevado</div>`;

  document.getElementById('body-svg').innerHTML = `
    <div class="sil-container">
      ${renderCol('Massa muscular (kg)', mMus,
          v => muscColor(v, mMin, mMax),
          v => muscTextColor(v, mMin, mMax),
          f, '', muscLegend)}
      ${renderCol('Gordura corporal (%)', mFat,
          fatColor, fatTextColor, fp, '%', fatLegend)}
    </div>`;
}

function renderSegDetail(m) {
  const segs = [
    {name:'Braço direito',  key:'right_arm'},

      <tbody>${rows}</tbody>
    </table>`;
}

async function loadUploadPatients() {
  const ps = await api('GET', '/bioscan/patients');
  if (!ps) return;
  window._uploadPatients = ps;
  renderUploadPatients(ps);
}

function filterUploadPatients(query) {
  const all = window._uploadPatients || [];
  const q = query.toLowerCase().trim();

  if (!q) { renderUploadPatients(all); return; }

  const qDigits = q.replace(/\D/g, '');
  const filtered = all.filter(p => {
    const nameMatch = p.name.toLowerCase().includes(q);
    const cpfMatch = qDigits && p.cpf && p.cpf.replace(/\D/g, '').includes(qDigits);
    return nameMatch || cpfMatch;
  });

  renderUploadPatients(filtered);
}

function renderUploadPatients(patients) {
  const el = document.getElementById('upload-patients');
  if (!el) return;

  if (!patients.length) {
    el.innerHTML = '<div style="color:#bbb;font-size:var(--fs-sm);padding:1rem;text-align:center">Nenhum paciente encontrado.</div>';
    return;
  }

  el.innerHTML = patients.map(p => {
    const isSelected = window._uploadPid === p.id;
    return `<div onclick="selectUploadPatient(${p.id})"
      style="padding:.6rem 1rem;font-size:var(--fs-sm);border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s;${isSelected ? 'background:#eef5e0' : ''}"
      onmouseover="this.style.background='${isSelected ? '#eef5e0' : '#fafaf8'}'"
      onmouseout="this.style.background='${isSelected ? '#eef5e0' : '#fff'}'">
      <strong>${p.name}</strong>${p.cpf ? ' <span style="color:#999">· ' + p.cpf + '</span>' : ''}
    </div>`;
  }).join('');
}

async function selectUploadPatient(id) {
  window._uploadPid = id;
  const p = window._uploadPatients.find(x => x.id === id);
  if (p) {
    document.getElementById('upload-selected').innerHTML =
      `Selecionado: <strong>${p.name}</strong>${p.cpf ? ' · ' + p.cpf : ''}`;
  }
  renderUploadPatients(window._uploadPatients);  // re-render para destacar
  await loadPatientMeasurements(id);
}

async function loadPatientMeasurements(pid) {
  const data = await api('GET', `/bioscan/patients/${pid}`);
  if (!data) return;

  const ms = data.measurements || [];
  const card = document.getElementById('measurements-card');
  const count = document.getElementById('meas-count');
  const list = document.getElementById('meas-list');

  card.style.display = 'block';
  count.textContent = `(${ms.length})`;

  if (!ms.length) {
    list.innerHTML = '<div style="color:#bbb;font-size:var(--fs-sm);padding:.5rem">Nenhuma medição registrada.</div>';
    return;
  }

  // Ordena mais recentes primeiro
  const sorted = [...ms].sort((a, b) => b.measured_at.localeCompare(a.measured_at));

  // Detecta medições no mesmo dia para mostrar hora
  const dates = sorted.map(m => m.measured_at.substring(0, 10));
  const hasSameDay = dates.length !== new Set(dates).size;

  const sourceLabels = {
    tanita_csv:  { label: 'CSV Tanita',  color: '#1a6fa8' },
    tanita_pdf:  { label: 'PDF Tanita',  color: '#16a085' },
    inbody_pdf:  { label: 'PDF InBody',  color: '#8e44ad' },
    pdf:         { label: 'PDF',         color: '#666'    },
    manual:      { label: 'Manual',      color: '#b07410' },
  };
  const srcBadge = (src) => {
    const s = sourceLabels[src] || { label: src || '—', color: '#999' };
    return `<span style="font-size:var(--fs-xs);padding:2px 6px;border-radius:4px;background:${s.color}15;color:${s.color};font-weight:500">${s.label}</span>`;
  };

  list.innerHTML = `
    <table class="evo-tbl">
      <thead><tr><th>Data</th><th>Origem</th><th>Peso</th><th>Gordura</th><th>Músculo</th><th>Visceral</th><th></th></tr></thead>
      <tbody>
        ${sorted.map(m => {
          const dt = m.measured_at.substring(0, 16).replace('T', ' ');
          const display = hasSameDay ? dt : dt.substring(0, 10);
          return `<tr>
            <td>${display}</td>
            <td>${srcBadge(m.source)}</td>
            <td>${m.weight ? m.weight.toFixed(1) + ' kg' : '—'}</td>
            <td>${m.fat_pct ? m.fat_pct.toFixed(1) + '%' : '—'}</td>
            <td>${m.muscle_kg ? m.muscle_kg.toFixed(2) + ' kg' : '—'}</td>
            <td>${m.visceral != null ? m.visceral : '—'}</td>
            <td style="text-align:right;white-space:nowrap">
              <button class="btn" style="padding:3px 8px;font-size:var(--fs-xs);margin-right:4px"
                onclick="editMeasurement(${pid}, ${m.id})" title="Editar">✎</button>
              ${isDoctor ? `<button class="btn" style="color:#c0392b;padding:3px 8px;font-size:var(--fs-xs)"
                onclick="deleteMeasurement(${pid}, ${m.id}, '${display}')" title="Excluir">✕</button>` : ''}
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

async function deleteMeasurement(pid, mid, dateStr) {
  if (!confirm(`Excluir medição de ${dateStr}?\n\nEsta ação não pode ser desfeita.`)) {
    return;
  }
  const result = await api('DELETE', `/bioscan/patients/${pid}/measurements/${mid}`);
  if (result && !result.error) {
    await loadPatientMeasurements(pid);
  } else {
    alert('Erro ao excluir: ' + (result?.error || 'desconhecido'));
  }
}

function openCSVPicker() {
  const result = document.getElementById('upload-result');
  if (!window._uploadPid) {
    result.innerHTML = '<div class="error-box">Selecione um paciente antes de importar o arquivo.</div>';
    return;
  }
  result.innerHTML = '';
  document.getElementById('csvfile').click();
}

async function uploadCSV(input) {

async function uploadFile(input) {
