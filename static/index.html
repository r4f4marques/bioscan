// ── BATCH DE ARQUIVOS ─────────────────────────────────────────────────────

// Estado do batch (persiste durante o fluxo)
let batchResults = [];   // [{file, status, data, error}]
let batchPid = null;

function openBatchPicker() {
  const result = document.getElementById('upload-result');
  if (!window._uploadPid) {
    result.innerHTML = '<div class="error-box">Selecione um paciente antes de importar.</div>';
    return;
  }
  result.innerHTML = '';
  document.getElementById('batchfile').click();
}

async function uploadBatch(input) {
  const files = Array.from(input.files || []);
  if (!files.length) return;

  if (files.length > 20) {
    alert(`Máximo 20 arquivos por vez (você selecionou ${files.length}).`);
    input.value = '';
    return;
  }

  const pid = window._uploadPid;
  batchPid = pid;
  input.value = '';

  // Abre tela dedicada ao batch
  renderBatchScreen(files);

  // Inicializa resultados com estado "pendente"
  batchResults = files.map((f, i) => ({
    idx: i,
    file: f,
    filename: f.name,
    status: 'pending',  // pending | processing | ok | error | duplicate
    data: null,
    error: null,
  }));

  renderBatchList();

  // Processa arquivos sequencialmente (evita sobrecarregar Groq API com 20 em paralelo)
  for (let i = 0; i < files.length; i++) {
    batchResults[i].status = 'processing';
    renderBatchList();

    try {
      const form = new FormData();
      form.append('file', files[i]);
      const data = await api('POST', `/bioscan/patients/${pid}/parse-file`, form, true);

      if (data && data.error) {
        batchResults[i].status = 'error';
        batchResults[i].error = data.error;
      } else if (data) {
        batchResults[i].status = data.duplicate_warning ? 'duplicate' : 'ok';
        batchResults[i].data = data;
      } else {
        batchResults[i].status = 'error';
        batchResults[i].error = 'Sem resposta da API';
      }
    } catch (e) {
      batchResults[i].status = 'error';
      batchResults[i].error = e.message || 'Erro desconhecido';
    }

    renderBatchList();
  }

  // Processamento concluído — atualiza contador no topo
  renderBatchSummary();
}

function renderBatchScreen(files) {
  destroyCharts();
  setNav(null);
  document.getElementById('topbar-title').textContent = `Importação em lote (${files.length})`;
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn" onclick="cancelBatch()">← Cancelar</button>`;

  document.getElementById('content').innerHTML = `
    <div class="card" id="batch-summary" style="margin-bottom:1rem">
      <div style="color:#666;font-size:var(--fs-sm)">Processando ${files.length} arquivo(s)...</div>
    </div>
    <div class="card">
      <div class="card-title">Arquivos selecionados</div>
      <div id="batch-list"></div>
    </div>`;
}

function renderBatchList() {
  const list = document.getElementById('batch-list');
  if (!list) return;

  const statusBadge = (r) => {
    switch (r.status) {
      case 'pending':    return '<span style="color:#bbb">Aguardando…</span>';
      case 'processing': return '<span style="color:#1a6fa8">⏳ Processando…</span>';
      case 'ok':         return '<span class="badge ok">✓ Pronto</span>';
      case 'error':      return '<span class="badge alert">✕ Erro</span>';
      case 'duplicate':  return '<span class="badge warn">⚠ Duplicata</span>';
    }
  };

  const infoLine = (r) => {
    if (r.status === 'ok' || r.status === 'duplicate') {
      const d = r.data.extracted || {};
      const parts = [];
      if (d.measured_at) parts.push(fmtDateBR(d.measured_at));
      if (r.data.manufacturer) parts.push(r.data.manufacturer === 'tanita' ? 'Tanita' : r.data.manufacturer === 'inbody' ? 'InBody' : r.data.manufacturer);
      if (d.weight) parts.push(`${d.weight.toFixed(1)} kg`);
      if (d.fat_pct) parts.push(`${d.fat_pct.toFixed(1)}% gordura`);
      return `<div style="font-size:var(--fs-xs);color:#666;margin-top:3px">${parts.join(' · ')}</div>`;
    }
    if (r.status === 'error') {
      return `<div style="font-size:var(--fs-xs);color:#c0392b;margin-top:3px">${r.error}</div>`;
    }
    if (r.status === 'duplicate') {
      return `<div style="font-size:var(--fs-xs);color:#b07410;margin-top:3px">${r.data.duplicate_warning}</div>`;
    }
    return '';
  };

  list.innerHTML = batchResults.map((r, idx) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:0.5px solid #f0f0f0;gap:8px">
      <div style="flex:1;min-width:0">
        <div style="font-size:var(--fs-sm);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.filename}</div>
        ${infoLine(r)}
      </div>
      <div style="text-align:right;white-space:nowrap;display:flex;gap:6px;align-items:center">
        ${statusBadge(r)}
        ${(r.status === 'ok' || r.status === 'duplicate')
          ? `<button class="btn" style="padding:3px 8px;font-size:var(--fs-xs)" onclick="reviewBatchItem(${idx})">Revisar</button>`
          : ''}
        ${(r.status !== 'processing')
          ? `<button class="btn" style="padding:3px 8px;font-size:var(--fs-xs);color:#c0392b" onclick="removeBatchItem(${idx})" title="Remover da lista">✕</button>`
          : ''}
      </div>
    </div>
  `).join('');
}

function renderBatchSummary() {
  const summary = document.getElementById('batch-summary');
  if (!summary) return;

  const ok = batchResults.filter(r => r.status === 'ok').length;
  const dup = batchResults.filter(r => r.status === 'duplicate').length;
  const err = batchResults.filter(r => r.status === 'error').length;
  const savable = ok + dup;

  summary.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <div style="font-size:var(--fs-sm)">
        <strong>${ok}</strong> prontos${dup ? `, <strong>${dup}</strong> com aviso de duplicata` : ''}${err ? `, <strong>${err}</strong> com erro` : ''}
      </div>
      ${savable > 0 ? `
        <button class="btn btn-primary" onclick="saveAllBatch()">
          ✓ Salvar ${savable} medição(ões) no banco
        </button>` : `
        <div style="color:#999;font-size:var(--fs-sm)">Nenhum arquivo pronto para salvar.</div>`}
    </div>`;
}

function removeBatchItem(idx) {
  if (!confirm(`Remover "${batchResults[idx].filename}" da lista?`)) return;
  batchResults.splice(idx, 1);
  // Reordena índices
  batchResults.forEach((r, i) => r.idx = i);
  renderBatchList();
  renderBatchSummary();
}

function reviewBatchItem(idx) {
  const r = batchResults[idx];
  if (!r || !r.data) return;

  // Guarda índice para voltar depois de salvar/cancelar
  window._batchReviewIdx = idx;

  // Setup do editor (reusa estrutura existente)
  editingMeasurement = { ...r.data.extracted };
  editingPid = batchPid;
  editingOriginalId = null;  // null = novo
  window._importMeta = {
    manufacturer: r.data.manufacturer,
    detected_name: r.data.detected_name,
    file_type: r.data.file_type,
    original_filename: r.filename,
    duplicate_warning: r.data.duplicate_warning,
  };

  // Busca paciente (pode já estar em currentPatient)
  if (!currentPatient || currentPatient.id !== batchPid) {
    api('GET', `/bioscan/patients/${batchPid}`).then(p => {
      if (p) {
        currentPatient = p;
        renderBatchReviewEditor(p, idx);
      }
    });
  } else {
    renderBatchReviewEditor(currentPatient, idx);
  }
}

function renderBatchReviewEditor(patient, idx) {
  // Reusa o editor de preview, mas com botão "Salvar alterações no lote" em vez de "Salvar"
  renderImportPreviewEditor(patient);

  // Sobrescreve botões da topbar
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn" onclick="backToBatchList()">← Voltar ao lote</button>
    <button class="btn btn-primary" onclick="saveBatchItemEdits(${idx})">✓ Aplicar alterações</button>`;
}

function saveBatchItemEdits(idx) {
  // Atualiza o data.extracted do item no batch com os dados editados
  batchResults[idx].data.extracted = { ...editingMeasurement };
  batchResults[idx].data._edited = true;

  editingMeasurement = null;
  window._importMeta = null;

  backToBatchList();
}

function backToBatchList() {
  // Volta para a tela do batch sem perder os resultados
  document.getElementById('topbar-title').textContent = `Importação em lote (${batchResults.length})`;
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn" onclick="cancelBatch()">← Cancelar</button>`;

  document.getElementById('content').innerHTML = `
    <div class="card" id="batch-summary" style="margin-bottom:1rem"></div>
    <div class="card">
      <div class="card-title">Arquivos processados</div>
      <div id="batch-list"></div>
    </div>`;

  renderBatchList();
  renderBatchSummary();
}

async function saveAllBatch() {
  const savable = batchResults.filter(r => r.status === 'ok' || r.status === 'duplicate');
  if (!savable.length) {
    alert('Nenhum arquivo pronto para salvar.');
    return;
  }

  if (!confirm(`Salvar ${savable.length} medição(ões) no banco?\n\nMedições com aviso de duplicata serão rejeitadas pelo servidor (data já existente).`)) {
    return;
  }

  let saved = 0;
  let failed = 0;
  const failures = [];

  for (const r of savable) {
    const payload = { ...r.data.extracted, _edited_in_preview: !!r.data._edited };
    try {
      const result = await api('POST', `/bioscan/patients/${batchPid}/save-measurement`, payload);
      if (result && !result.error) {
        saved++;
        r.status = 'saved';
      } else {
        failed++;
        failures.push(`${r.filename}: ${result?.error || 'erro desconhecido'}`);
        r.status = 'error';
        r.error = result?.error || 'erro ao salvar';
      }
    } catch (e) {
      failed++;
      failures.push(`${r.filename}: ${e.message}`);
      r.status = 'error';
      r.error = e.message;
    }
    renderBatchList();
  }

  // Relatório final
  const msg = `${saved} medição(ões) salva(s) com sucesso${failed ? `. ${failed} falharam.` : '.'}`;
  if (failures.length) {
    alert(msg + '\n\nErros:\n' + failures.join('\n'));
  } else {
    alert(msg);
  }

  // Se tudo salvou, volta para a tela de upload
  if (failed === 0) {
    batchResults = [];
    batchPid = null;
    showScreen('upload');
    setTimeout(() => {
      const resEl = document.getElementById('upload-result');
      if (resEl) {
        resEl.innerHTML = `<div class="success-box">✓ ${saved} medição(ões) importada(s) em lote com sucesso!</div>`;
      }
      if (window._uploadPid) loadPatientMeasurements(window._uploadPid);
    }, 100);
  } else {
    // Atualiza tela com status final
    renderBatchSummary();
  }
}

function cancelBatch() {
  if (batchResults.length && !confirm('Descartar lote? Todos os arquivos processados serão perdidos.')) return;
  batchResults = [];
  batchPid = null;
  window._batchReviewIdx = null;
  showScreen('upload');
}

async function confirmImportPreview() {
  const pid = editingPid;

  const result = await api('POST', `/bioscan/patients/${pid}/save-measurement`, payload);

  if (!result) return;

    alert('Erro ao salvar: ' + result.error);

  editingMeasurement = null;
  editingPid = null;
  window._importMeta = null;

  setTimeout(() => {

      resEl.innerHTML = `<div class="success-box">✓ Medição salva com sucesso após revisão!</div>`;

            onclick="generateResetLink(${u.id}, '${u.name?.replace(/'/g, "\\'") || u.email}')" title="Gerar link de senha">🔗</button>
          ${!isSelf ? `<button class="btn" style="color:#c0392b;padding:3px 8px;font-size:var(--fs-xs)"
            onclick="deleteUser(${u.id}, '${u.name?.replace(/'/g, "\\'") || u.email}')" title="Excluir">✕</button>` : ''}
        </td>
      </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-title">Profissionais <small>${users.length} cadastrado(s)</small></div>
      <table class="evo-tbl">
        <thead><tr><th>Nome</th><th>E-mail</th><th>Papel</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="card" style="margin-top:1rem;background:#f0f4ff;border-color:#c5d8f4">
      <div style="font-size:var(--fs-sm);color:#1a4fa8;line-height:1.6">
        <strong>Como funciona:</strong><br>
        Ao cadastrar um novo profissional, o sistema gera um link de primeiro acesso (válido por 7 dias).
        Copie o link e envie à pessoa por WhatsApp, e-mail ou pessoalmente.
        Ao acessar, ela definirá a própria senha.
      </div>
    </div>`;
}

function showNewUserForm() {
  destroyCharts();
  setNav(null);
  document.getElementById('topbar-title').textContent = 'Novo profissional';
  document.getElementById('topbar-actions').innerHTML =
    '<button class="btn" onclick="showScreen(\'users\')">← Voltar</button>';

  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:560px">
      <div class="card-title">Cadastrar profissional</div>
      <div class="form-row">
        <label>Nome completo</label>
        <input type="text" id="new-user-name" placeholder="Dra. Maria Silva">
      </div>
      <div class="form-row">
        <label>E-mail</label>
        <input type="email" id="new-user-email" placeholder="maria@clinica.com">
      </div>
      <div class="form-row">
        <label>Papel</label>
        <select id="new-user-role" onchange="toggleAdminCheckbox()">
          <option value="doctor">Médico(a)</option>
          <option value="secretary">Secretária(o)</option>
        </select>
      </div>
      <div class="form-row" id="admin-checkbox-row">
        <label style="display:flex;align-items:center;gap:8px;font-weight:400;cursor:pointer">
          <input type="checkbox" id="new-user-is-admin" style="width:auto">

        </label>
      </div>
      <div style="display:flex;gap:8px;margin-top:1.5rem">
        <button class="btn" onclick="showScreen('users')">Cancelar</button>
        <button class="btn btn-primary" onclick="submitNewUser()">Cadastrar</button>
      </div>
    </div>`;
}

function toggleAdminCheckbox() {
  const role = document.getElementById('new-user-role').value;
  const row = document.getElementById('admin-checkbox-row');
  const check = document.getElementById('new-user-is-admin');
  if (role === 'secretary') {
    row.style.display = 'none';
    check.checked = false;
  } else {
    row.style.display = '';
  }
}

async function submitNewUser() {
  const name = document.getElementById('new-user-name').value.trim();
  const email = document.getElementById('new-user-email').value.trim();
  const role = document.getElementById('new-user-role').value;
  const is_admin = document.getElementById('new-user-is-admin').checked;

  if (!name) return alert('Nome obrigatório');
  if (!email) return alert('E-mail obrigatório');

  const data = await api('POST', '/bioscan/users', { name, email, role, is_admin });
  if (!data) return;
  if (data.error) return alert('Erro: ' + data.error);

  // Sucesso — mostra modal com link de primeiro acesso
  showResetLinkModal(data, name);
}

function showResetLinkModal(data, name) {
  const fullLink = window.location.origin + data.reset_link;
  const expiresDate = new Date(data.expires_at).toLocaleDateString('pt-BR');

  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:640px">
      <div class="success-box" style="margin-bottom:1rem">
        ✓ <strong>${name}</strong> cadastrado(a) com sucesso!
      </div>

      <div class="card-title">Link de primeiro acesso</div>
      <div style="font-size:var(--fs-sm);color:#666;margin-bottom:1rem;line-height:1.6">
        Copie este link e envie ao profissional (WhatsApp, e-mail, pessoalmente). 
        Ao clicar, ele poderá definir a própria senha.
        <br><strong>Válido até ${expiresDate}.</strong>
      </div>

      <div style="display:flex;gap:8px;align-items:center;margin:1rem 0">
        <input type="text" id="reset-link-input" value="${fullLink}" readonly
          style="flex:1;padding:11px 14px;border:1px solid #ddd;border-radius:8px;font-size:var(--fs-sm);font-family:monospace;background:#f9f9f7">
        <button class="btn btn-primary" onclick="copyResetLink()" id="copy-btn">Copiar</button>
      </div>

      <div class="info-box" style="margin-top:1rem">
        <small>
          <strong>Dica:</strong> se perder este link, você pode gerar um novo
          clicando no ícone 🔗 ao lado do profissional na lista.
        </small>
      </div>

      <div style="display:flex;gap:8px;margin-top:1.5rem">
        <button class="btn" onclick="showScreen('users')">Voltar à lista</button>
        <button class="btn" onclick="showNewUserForm()">+ Cadastrar outro</button>
      </div>
    </div>`;
}

function copyResetLink() {
  const input = document.getElementById('reset-link-input');
  input.select();
  input.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(input.value).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copiado!';
    btn.style.background = '#2d6a1f';
    btn.style.borderColor = '#2d6a1f';
    setTimeout(() => {
      btn.textContent = 'Copiar';
      btn.style.background = '';
      btn.style.borderColor = '';
    }, 2000);
  }).catch(() => alert('Falhou ao copiar. Selecione manualmente e copie (Cmd+C).'));
}

  const users = await api('GET', '/bioscan/users');
  if (!users) return;
  const u = users.find(x => x.id === uid);
  if (!u) return alert('Profissional não encontrado');

  destroyCharts();
  setNav(null);
  document.getElementById('topbar-title').textContent = 'Editar profissional';
  document.getElementById('topbar-actions').innerHTML =
    '<button class="btn" onclick="showScreen(\'users\')">← Voltar</button>';

  const isSelf = u.id === user.id;

  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:560px">
      <div class="card-title">${u.email}</div>
      <div class="form-row">
        <label>Nome</label>
        <input type="text" id="edit-user-name" value="${u.name || ''}">
      </div>
      <div class="form-row">
        <label>Papel</label>
        <select id="edit-user-role" onchange="toggleEditAdmin()" ${isSelf ? 'disabled' : ''}>
          <option value="doctor" ${u.role === 'doctor' ? 'selected' : ''}>Médico(a)</option>
          <option value="secretary" ${u.role === 'secretary' ? 'selected' : ''}>Secretária(o)</option>
        </select>
        ${isSelf ? '<small style="color:#999">Você não pode alterar o próprio papel</small>' : ''}
      </div>
      <div class="form-row" id="edit-admin-row">
        <label style="display:flex;align-items:center;gap:8px;font-weight:400;cursor:pointer">
          <input type="checkbox" id="edit-user-is-admin" ${u.is_admin ? 'checked' : ''} ${isSelf ? 'disabled' : ''} style="width:auto">
          Administrador (pode gerenciar outros profissionais)
        </label>
        ${isSelf ? '<small style="color:#999">Você não pode remover o próprio privilégio de admin</small>' : ''}
      </div>
      <div class="form-row">
        <label style="display:flex;align-items:center;gap:8px;font-weight:400;cursor:pointer">
          <input type="checkbox" id="edit-user-is-active" ${u.is_active ? 'checked' : ''} ${isSelf ? 'disabled' : ''} style="width:auto">
          Conta ativa (pode fazer login)
        </label>
      </div>
      <div style="display:flex;gap:8px;margin-top:1.5rem">
        <button class="btn" onclick="showScreen('users')">Cancelar</button>
        <button class="btn btn-primary" onclick="submitEditUser(${u.id})">Salvar alterações</button>
      </div>
    </div>`;

  toggleEditAdmin();
}

function toggleEditAdmin() {
  const role = document.getElementById('edit-user-role').value;
  const row = document.getElementById('edit-admin-row');
  const check = document.getElementById('edit-user-is-admin');
  if (role === 'secretary') {
    row.style.display = 'none';
    check.checked = false;
  } else {
    row.style.display = '';
  }
}

async function submitEditUser(uid) {
  const payload = {
    name: document.getElementById('edit-user-name').value.trim(),
    role: document.getElementById('edit-user-role').value,
    is_admin: document.getElementById('edit-user-is-admin').checked,
    is_active: document.getElementById('edit-user-is-active').checked,
  };

  const data = await api('PATCH', `/bioscan/users/${uid}`, payload);
  if (!data) return;
  if (data.error) return alert('Erro: ' + data.error);

  showScreen('users');
}

async function generateResetLink(uid, name) {
  if (!confirm(`Gerar novo link de primeiro acesso para ${name}?\n\nIsso invalida qualquer link anterior.`)) return;
  const data = await api('POST', `/bioscan/users/${uid}/reset-link`);
  if (!data) return;
  if (data.error) return alert('Erro: ' + data.error);

  showResetLinkModal(data, name);
}

async function deleteUser(uid, name) {
  if (!confirm(`Excluir ${name}?\n\nEsta ação não pode ser desfeita.`)) return;
  const data = await api('DELETE', `/bioscan/users/${uid}`);
  if (!data) return;
  if (data.error) return alert('Erro: ' + data.error);

  renderUsersScreen();  // recarrega lista
}

// ── EDITOR DE MEDIÇÃO ─────────────────────────────────────────────────────

let editingMeasurement = null;     // cópia local da medição em edição
let editingPid = null;
let editingOriginalId = null;

// Grupos de campos para a interface do editor
const EDIT_GROUPS = [
  {
    title: 'Principais',
    fields: [
      { key: 'weight',          label: 'Peso',              unit: 'kg',    step: 0.1 },
      { key: 'bmi',             label: 'IMC',               unit: 'kg/m²', step: 0.1 },
      { key: 'fat_pct',         label: 'Gordura corporal',  unit: '%',     step: 0.1 },
      { key: 'visceral',        label: 'Gordura visceral',  unit: '',      step: 0.1 },
      { key: 'muscle_kg',       label: 'Massa muscular',    unit: 'kg',    step: 0.01 },
      { key: 'muscle_quality',  label: 'Qualidade muscular', unit: '',     step: 1 },
      { key: 'bone_kg',         label: 'Massa óssea',       unit: 'kg',    step: 0.01 },
    ],
    collapsed: false,
  },
  {
    title: 'Parâmetros adicionais',
    fields: [
      { key: 'ffm_kg',           label: 'Massa magra (FFM)', unit: 'kg',   step: 0.1 },
      { key: 'water_pct',        label: 'Água corporal',     unit: '%',    step: 0.1 },
      { key: 'water_kg',         label: 'Água (kg)',         unit: 'kg',   step: 0.1 },
      { key: 'bmr',              label: 'Metabolismo basal', unit: 'kcal', step: 1 },
      { key: 'meta_age',         label: 'Idade metabólica',  unit: 'anos', step: 1 },
      { key: 'physique_rating',  label: 'Physique rating',   unit: '',     step: 1 },
      { key: 'heart_rate',       label: 'Frequência cardíaca', unit: 'bpm', step: 1 },
      { key: 'smi',              label: 'SMI',               unit: 'kg/m²',step: 0.01 },
      { key: 'protein_kg',       label: 'Proteína',          unit: 'kg',   step: 0.01 },
      { key: 'mineral_kg',       label: 'Minerais',          unit: 'kg',   step: 0.01 },
      { key: 'waist_hip_ratio',  label: 'Cintura/quadril',   unit: '',     step: 0.01 },
      { key: 'obesity_degree',   label: 'Grau de obesidade', unit: '%',    step: 1 },
      { key: 'recommended_kcal', label: 'Ingestão recomendada', unit: 'kcal', step: 1 },
      { key: 'inbody_score',     label: 'Pontuação InBody',  unit: '/100', step: 1 },
    ],
    collapsed: true,
  },
];

const SEGMENT_KEYS = [
  { key: 'right_arm',  label: 'Braço direito' },
  { key: 'left_arm',   label: 'Braço esquerdo' },
  { key: 'right_leg',  label: 'Perna direita' },
  { key: 'left_leg',   label: 'Perna esquerda' },
  { key: 'trunk',      label: 'Tronco' },
];

async function editMeasurement(pid, mid) {
  // Busca dados atuais do paciente e encontra a medição
  const patient = await api('GET', `/bioscan/patients/${pid}`);
  if (!patient) return;
  const m = (patient.measurements || []).find(x => x.id === mid);
  if (!m) {
    alert('Medição não encontrada.');
    return;
  }

  currentPatient = patient;  // garante que renderMuscleFatBars tenha contexto
  editingMeasurement = JSON.parse(JSON.stringify(m));  // cópia profunda
  editingPid = pid;
  editingOriginalId = mid;

  renderMeasurementEditor(patient, m);
}

function renderMeasurementEditor(patient, original) {
  destroyCharts();
  setNav(null);
  document.getElementById('topbar-title').textContent = 'Editar medição';
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn" onclick="cancelEditMeasurement()">← Cancelar</button>
    <button class="btn btn-primary" onclick="saveEditMeasurement()">✓ Salvar alterações</button>`;

  const m = editingMeasurement;
  const dateValue = m.measured_at ? m.measured_at.substring(0, 10) : '';

  const principalHTML = EDIT_GROUPS[0].fields.map(f => rowForField(f)).join('');
  const additionalHTML = EDIT_GROUPS[1].fields.map(f => rowForField(f)).join('');

  const segmentalHTML = SEGMENT_KEYS.map(s => `
    <tr style="border-bottom:0.5px solid #f0f0f0">
      <td style="padding:6px 4px;color:#666">${s.label}</td>
      <td style="padding:4px">
        <input type="number" value="${m['seg_musc_' + s.key] ?? ''}" step="0.01"
          oninput="updateEditField('seg_musc_${s.key}', this.value)"
          style="width:100%;padding:4px 6px;border:1px solid #ddd;border-radius:4px;font-size:var(--fs-xs)">
      </td>
      <td style="padding:4px">
        <input type="number" value="${m['seg_fat_' + s.key] ?? ''}" step="0.1"
          oninput="updateEditField('seg_fat_${s.key}', this.value)"
          style="width:100%;padding:4px 6px;border:1px solid #ddd;border-radius:4px;font-size:var(--fs-xs)">
      </td>
      <td style="padding:4px">
        <input type="number" value="${m['seg_qual_' + s.key] ?? ''}" step="1"
          oninput="updateEditField('seg_qual_${s.key}', this.value)"
          style="width:100%;padding:4px 6px;border:1px solid #ddd;border-radius:4px;font-size:var(--fs-xs)">
      </td>
    </tr>
  `).join('');

  document.getElementById('content').innerHTML = `
    <div class="card" style="padding:1rem 1.25rem;margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <div>
          <div style="font-size:var(--fs-base);font-weight:500">${patient.name}</div>
          <div style="font-size:var(--fs-sm);color:#666;margin-top:4px">
            Origem: <strong>${m.source || '—'}</strong> ·
            Importada em ${fmtDateBR(original.measured_at)}
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid-2" style="gap:16px">
      <div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div class="card-title" style="margin:0">Dados da medição</div>
          </div>

          <table style="width:100%;font-size:var(--fs-sm);border-collapse:collapse">
            <tr style="border-bottom:0.5px solid #f0f0f0">
              <td style="padding:8px 0;color:#666;width:45%">Data da medição</td>
              <td style="padding:8px 0">
                <input type="date" value="${dateValue}"
                  oninput="updateEditField('measured_at_date', this.value)"
                  style="width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:var(--fs-sm)">
              </td>
            </tr>
            ${principalHTML}
          </table>

          <details style="margin-top:12px">
            <summary style="font-size:var(--fs-sm);font-weight:500;cursor:pointer;padding:8px 0">
              ▸ Parâmetros adicionais (${EDIT_GROUPS[1].fields.length} campos)
            </summary>
            <table style="width:100%;font-size:var(--fs-sm);border-collapse:collapse;margin-top:8px">
              ${additionalHTML}
            </table>
          </details>

          <details style="margin-top:8px">
            <summary style="font-size:var(--fs-sm);font-weight:500;cursor:pointer;padding:8px 0">
              ▸ Segmentais (5 segmentos × 3 dados)
            </summary>
            <table style="width:100%;font-size:var(--fs-xs);border-collapse:collapse;margin-top:8px">
              <thead>
                <tr style="border-bottom:0.5px solid #ddd">
                  <th style="text-align:left;padding:6px 4px;color:#999;font-weight:500">Segmento</th>
                  <th style="padding:6px 4px;color:#999;font-weight:500">Músculo (kg)</th>
                  <th style="padding:6px 4px;color:#999;font-weight:500">Gordura (%)</th>
                  <th style="padding:6px 4px;color:#999;font-weight:500">Qualidade</th>
                </tr>
              </thead>
              <tbody>${segmentalHTML}</tbody>
            </table>
          </details>
        </div>
      </div>

      <div>
        <div class="card">
          <div class="card-title">Pré-visualização</div>
          <div id="edit-preview">${renderEditPreview(patient)}</div>
          <div class="info-box" style="margin-top:12px">
            <small>A pré-visualização atualiza conforme você edita. Compare com o arquivo original antes de salvar.</small>
          </div>
        </div>
      </div>
    </div>`;
}

function rowForField(f) {
  const m = editingMeasurement;
  const value = m[f.key];
  return `
    <tr style="border-bottom:0.5px solid #f0f0f0">
      <td style="padding:8px 0;color:#666;width:45%">${f.label}${f.unit ? ' (' + f.unit + ')' : ''}</td>
      <td style="padding:8px 0">
        <input type="number" value="${value ?? ''}" step="${f.step}"
          oninput="updateEditField('${f.key}', this.value)"
          style="width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:var(--fs-sm)">
      </td>
    </tr>`;
}

function updateEditField(key, rawValue) {
  // Campo especial: data
  if (key === 'measured_at_date') {
    if (rawValue) {
      // Preserva horário original (se existia)
      const oldTime = editingMeasurement.measured_at?.substring(10) || 'T00:00:00';
      editingMeasurement.measured_at = rawValue + oldTime;
    }
  } else {
    // Campo numérico: converte string → número ou null
    if (rawValue === '' || rawValue == null) {
      editingMeasurement[key] = null;
    } else {
      const num = parseFloat(rawValue);
      editingMeasurement[key] = isNaN(num) ? null : num;
    }

    // Recalcula seg_fat via compute-at-render: atualiza o objeto seg_fat
    if (key.startsWith('seg_fat_') || key.startsWith('seg_musc_')) {
      editingMeasurement.seg_fat = editingMeasurement.seg_fat || {};
      editingMeasurement.seg_musc = editingMeasurement.seg_musc || {};
      if (key.startsWith('seg_fat_')) {
        const side = key.replace('seg_fat_', '');
        editingMeasurement.seg_fat[side] = editingMeasurement[key];
      } else {
        const side = key.replace('seg_musc_', '');
        editingMeasurement.seg_musc[side] = editingMeasurement[key];
      }
    }
  }

  // Atualiza preview (busca patient do estado atual)
  const patient = currentPatient;
  if (patient) {
    const previewEl = document.getElementById('edit-preview');
    if (previewEl) previewEl.innerHTML = renderEditPreview(patient);
  }
}

function renderEditPreview(patient) {
  const m = editingMeasurement;
  return renderMuscleFatBars(m, patient) + '<div style="margin-top:1rem"></div>' + renderObesityBars(m, patient);
}

function cancelEditMeasurement() {
  if (!confirm('Descartar alterações?')) return;
  selectPatient(editingPid);  // volta para a Overview do paciente
}

async function saveEditMeasurement() {
  // Monta payload só com campos escalares (evita enviar seg_fat/seg_musc/seg_qual dict)
  const payload = {};
  const fieldKeys = [
    ...EDIT_GROUPS[0].fields.map(f => f.key),
    ...EDIT_GROUPS[1].fields.map(f => f.key),
  ];
  for (const k of fieldKeys) {
    payload[k] = editingMeasurement[k];
  }
  // Segmentais (15 campos)
  for (const s of SEGMENT_KEYS) {
    payload['seg_musc_' + s.key] = editingMeasurement['seg_musc_' + s.key];
    payload['seg_fat_' + s.key]  = editingMeasurement['seg_fat_' + s.key];
    payload['seg_qual_' + s.key] = editingMeasurement['seg_qual_' + s.key];
  }
  // Data
  payload.measured_at = editingMeasurement.measured_at;

  const result = await api('PATCH',
    `/bioscan/patients/${editingPid}/measurements/${editingOriginalId}`,
    payload);

  if (result && !result.error) {
    selectPatient(editingPid);  // volta para Overview com dados atualizados
  } else {
    alert('Erro ao salvar: ' + (result?.error || 'desconhecido'));
  }
}

showScreen('list');
</script>
