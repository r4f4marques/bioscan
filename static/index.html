<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioScan Healthspan</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px}
.sidebar{width:210px;background:#fff;border-right:1px solid rgba(0,0,0,0.08);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:10}
.logo{padding:1.1rem 1rem;font-size:15px;font-weight:600;border-bottom:1px solid rgba(0,0,0,0.06);letter-spacing:-0.3px}
.logo span{font-weight:400;color:#bbb}
.nav{flex:1;padding:.5rem 0;overflow-y:auto}
.nav-section{font-size:10px;color:#bbb;padding:.75rem 1rem .2rem;text-transform:uppercase;letter-spacing:.06em}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 1rem;cursor:pointer;font-size:13px;color:#666;transition:all .1s}
.nav-item:hover,.nav-item.active{background:#f5f4f0;color:#1a1a18}
.nav-item.active{font-weight:500}
.sidebar-footer{padding:.9rem 1rem;border-top:1px solid rgba(0,0,0,0.06);font-size:12px;color:#999}
.sidebar-footer strong{display:block;font-size:13px;color:#1a1a18;font-weight:500}
.logout{cursor:pointer;color:#bbb;text-decoration:underline;font-size:11px}
.main{margin-left:210px;min-height:100vh}
.topbar{padding:.9rem 1.5rem;border-bottom:1px solid rgba(0,0,0,0.08);background:#fff;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.topbar-title{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.content{padding:1.5rem}
.grid{display:grid;gap:10px;margin-bottom:1.25rem}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:1fr 1fr}
.mcard{background:#f5f4f0;border-radius:10px;padding:.85rem 1rem}
.mcard-label{font-size:11px;color:#999;margin-bottom:5px}
.mcard-val{font-size:22px;font-weight:600;line-height:1.1;letter-spacing:-0.5px}
.mcard-unit{font-size:13px;font-weight:400;color:#999;margin-left:2px}
.mcard-sub{font-size:11px;color:#bbb;margin-top:3px}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;margin-top:4px}
.ok{background:#e8f5e0;color:#2d6a1f}
.warn{background:#fef3e0;color:#7a4f00}
.alert{background:#fde8e8;color:#9b1c1c}
.card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:1rem}
.card-title{font-size:13px;font-weight:600;margin-bottom:1rem;letter-spacing:-0.2px}
.card-title small{font-size:11px;font-weight:400;color:#bbb;margin-left:6px}
.pt-table{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;overflow:hidden}
.pt-head{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 90px;padding:.6rem 1rem;border-bottom:1px solid rgba(0,0,0,0.06);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#bbb}
.pt-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 90px;padding:.8rem 1rem;border-bottom:1px solid rgba(0,0,0,0.05);align-items:center;cursor:pointer;transition:background .1s}
.pt-row:last-child{border-bottom:none}
.pt-row:hover{background:#fafaf8}
.pt-name{font-size:13px;font-weight:500}
.pt-sub{font-size:11px;color:#bbb}
.btn{padding:5px 12px;border:1px solid rgba(0,0,0,0.12);border-radius:6px;background:#fff;color:#1a1a18;font-size:12px;cursor:pointer;transition:all .1s}
.btn:hover{background:#f5f4f0}
.btn-primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
.btn-primary:hover{opacity:.85}
.upload-zone{border:1.5px dashed rgba(0,0,0,0.15);border-radius:10px;padding:2rem;text-align:center;cursor:pointer;background:#fafaf8;transition:border-color .15s}
.upload-zone:hover{border-color:rgba(0,0,0,0.3)}
.evo-tbl{width:100%;border-collapse:collapse;font-size:12px}
.evo-tbl th{text-align:left;padding:.4rem .75rem;font-size:10px;color:#bbb;font-weight:400;border-bottom:1px solid rgba(0,0,0,0.06);text-transform:uppercase}
.evo-tbl td{padding:.55rem .75rem;border-bottom:1px solid rgba(0,0,0,0.05)}
.evo-tbl tr:last-child td{border-bottom:none}
.interpret-box{background:#f5f4f0;border-radius:10px;padding:1rem;font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:400px;overflow-y:auto}
.age-row{display:flex;align-items:center;gap:16px;padding:.5rem 0}
.age-num{font-size:32px;font-weight:600;line-height:1;letter-spacing:-1px}
.age-lbl{font-size:11px;color:#bbb;margin-top:2px}
.loading{text-align:center;padding:3rem;color:#bbb;font-size:13px}
.form-row{margin-bottom:.75rem}
.form-row label{display:block;font-size:12px;color:#666;margin-bottom:3px}
.form-row label small{color:#bbb;font-weight:400}
.form-row input,.form-row select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;color:#1a1a18}
.form-row input:focus,.form-row select:focus{outline:none;border-color:#555}
.success-box{background:#e8f5e0;border-radius:8px;padding:.75rem 1rem;font-size:13px;color:#2d6a1f;margin-top:.75rem}
.info-box{background:#f0f4ff;border-radius:8px;padding:.75rem 1rem;font-size:12px;color:#1a4fa8;margin-top:.75rem;line-height:1.6}
.error-box{color:#c0392b;font-size:12px;padding:.5rem .75rem;background:#fde8e8;border-radius:6px;margin-top:.5rem}
.chart-container{position:relative;height:200px;margin-top:.5rem}
.body-diagram{display:flex;justify-content:center;padding:1rem}
.body-diagram svg{max-width:340px;width:100%}
.body-legend{display:flex;gap:1rem;justify-content:center;font-size:11px;color:#888;margin-top:.75rem;flex-wrap:wrap}
.body-legend-item{display:flex;align-items:center;gap:4px}
.body-legend-dot{width:10px;height:10px;border-radius:2px}
.seg-label{font-size:10px;font-weight:500;fill:#1a1a18}
.seg-label-sub{font-size:9px;fill:#666}
.body-toggle{display:flex;gap:0;margin-bottom:.75rem;border:1px solid #eee;border-radius:6px;overflow:hidden;max-width:260px;margin-left:auto;margin-right:auto}
.body-toggle-btn{flex:1;padding:5px;font-size:11px;cursor:pointer;border:none;background:#f5f4f0;color:#999;transition:all .15s}
.body-toggle-btn.active{background:#1a1a18;color:#fff}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">BioScan <span>Healthspan</span></div>
  <div class="nav" id="sidebar-nav">
    <div class="nav-section">Clínica</div>
    <div class="nav-item active" id="nav-list" onclick="showScreen('list')">◈ Pacientes</div>
    <div class="nav-item" id="nav-new-patient" onclick="showScreen('new-patient')" style="display:none">+ Novo paciente</div>
    <div class="nav-item" id="nav-upload" onclick="showScreen('upload')" style="display:none">↑ Importar CSV</div>
    <div id="nav-patient-section" style="display:none">
      <div class="nav-section" id="nav-patient-name">Paciente</div>
      <div class="nav-item" id="nav-overview" onclick="showTab('overview')">○ Visão geral</div>
      <div class="nav-item" id="nav-evolution" onclick="showTab('evolution')">↗ Evolução</div>
      <div class="nav-item" id="nav-segments" onclick="showTab('segments')">◫ Segmental</div>
    </div>
  </div>
  <div class="sidebar-footer">
    <strong id="footer-name">—</strong>
    <span id="footer-role">—</span> · <span class="logout" onclick="logout()">Sair</span>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Carregando...</div>
    <div id="topbar-actions"></div>
  </div>
  <div class="content" id="content">
    <div class="loading">Carregando...</div>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('bioscan_token');
let user  = JSON.parse(localStorage.getItem('bioscan_user') || '{}');
let currentPatient = null;
let isDoctor = false;
let charts = {};

if (!token) window.location.href = '/';

isDoctor = user.role === 'doctor';
document.getElementById('footer-name').textContent = user.name || user.email || '—';
document.getElementById('footer-role').textContent = isDoctor ? 'Médico' : 'Paciente';

if (isDoctor) {
  document.getElementById('nav-new-patient').style.display = 'flex';
  document.getElementById('nav-upload').style.display = 'flex';
}

async function api(method, path, body, isForm) {
  const opts = { method, headers: {'Authorization': 'Bearer ' + token} };
  if (body && !isForm) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  } else if (isForm) {
    opts.body = body;
  }
  const res = await fetch(API + path, opts);
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

function logout() {
  localStorage.removeItem('bioscan_token');
  localStorage.removeItem('bioscan_user');
  window.location.href = '/';
}

function setNav(id) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
}

function showScreen(screen) {
  destroyCharts();
  document.getElementById('nav-patient-section').style.display = 'none';
  document.getElementById('topbar-actions').innerHTML = '';
  currentPatient = null;

  if (screen === 'list') {
    setNav('nav-list');
    document.getElementById('topbar-title').textContent = 'Pacientes';
    if (isDoctor) {
      document.getElementById('topbar-actions').innerHTML =
        '<button class="btn btn-primary" onclick="showScreen(\'new-patient\')">+ Novo paciente</button>';
    }
    loadPatients();
  } else if (screen === 'new-patient') {
    setNav('nav-new-patient');
    document.getElementById('topbar-title').textContent = 'Novo paciente';
    renderNewPatient();
  } else if (screen === 'upload') {
    setNav('nav-upload');
    document.getElementById('topbar-title').textContent = 'Importar CSV';
    renderUpload();
  }
}

function showPatient(p) {
  currentPatient = p;
  document.getElementById('nav-patient-section').style.display = 'block';
  document.getElementById('nav-patient-name').textContent = p.name.split(' ')[0];
  document.getElementById('topbar-title').textContent = p.name;
  document.getElementById('topbar-actions').innerHTML =
    '<button class="btn" onclick="showScreen(\'list\')">← Voltar</button>';
  showTab('overview');
}

function showTab(tab) {
  destroyCharts();
  ['overview','evolution','segments'].forEach(t => {
    const el = document.getElementById('nav-' + t);
    if (el) el.classList.toggle('active', t === tab);
  });
  if (tab === 'overview') renderOverview();
  else if (tab === 'evolution') renderEvolution();
  else if (tab === 'segments') renderSegments();
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function fatStatus(v, sex) {
  if (sex === 'F') return v < 30 ? 'ok' : v < 35 ? 'warn' : 'alert';
  return v < 25 ? 'ok' : v < 30 ? 'warn' : 'alert';
}
function viscStatus(v) { return v <= 9 ? 'ok' : v <= 14 ? 'warn' : 'alert'; }
function metaStatus(v, age) { const d = v - age; return d <= 0 ? 'ok' : d <= 5 ? 'warn' : 'alert'; }
function bmiStatus(v) { return v < 25 ? 'ok' : v < 30 ? 'warn' : 'alert'; }
function bl(s) { return s === 'ok' ? 'Normal' : s === 'warn' ? 'Atenção' : 'Elevado'; }

// ── MÁSCARAS ──────────────────────────────────────────────────────────────
function maskCPF(v) {
  v = v.replace(/\D/g,'').slice(0,11);
  if (v.length > 9)      return v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2}).*/, '$1.$2.$3-$4');
  else if (v.length > 6) return v.replace(/(\d{3})(\d{3})(\d{1,3}).*/, '$1.$2.$3');
  else if (v.length > 3) return v.replace(/(\d{3})(\d{1,3}).*/, '$1.$2');
  return v;
}
function maskPhone(v) {
  v = v.replace(/\D/g,'').slice(0,11);
  if (v.length > 10)     return v.replace(/(\d{2})(\d{5})(\d{1,4}).*/, '($1) $2-$3');
  else if (v.length > 6) return v.replace(/(\d{2})(\d{4,5})(\d{1,4}).*/, '($1) $2-$3');
  else if (v.length > 2) return v.replace(/(\d{2})(\d{1,5}).*/, '($1) $2');
  else if (v.length > 0) return v.replace(/(\d{1,2}).*/, '($1');
  return v;
}

// ── PATIENTS LIST ─────────────────────────────────────────────────────────
async function loadPatients() {
  document.getElementById('content').innerHTML = '<div class="loading">Carregando...</div>';

  if (!isDoctor) {
    const pid = user.patient_id;
    if (!pid) {
      document.getElementById('content').innerHTML = '<div class="loading">Perfil não encontrado.</div>';
      return;
    }
    const p = await api('GET', `/bioscan/patients/${pid}`);
    if (p) showPatient(p);
    return;
  }

  const patients = await api('GET', '/bioscan/patients');
  if (!patients) return;

  if (!patients.length) {
    document.getElementById('content').innerHTML = `
      <div style="text-align:center;padding:3rem;color:#bbb">
        <div style="font-size:32px;margin-bottom:1rem">◈</div>
        <div style="font-size:14px;margin-bottom:1rem">Nenhum paciente cadastrado</div>
        <button class="btn btn-primary" onclick="showScreen('new-patient')">+ Cadastrar primeiro paciente</button>
      </div>`;
    return;
  }

  const rows = patients.map(p => {
    const l = p.latest || {};
    return `<div class="pt-row" onclick="selectPatient(${p.id})">
      <div><div class="pt-name">${p.name}</div><div class="pt-sub">${p.age ? p.age + 'a' : '—'} · ${p.sex === 'M' ? 'Masc' : p.sex === 'F' ? 'Fem' : '—'} ${p.cpf ? '· ' + p.cpf : ''}</div></div>
      <div>${l.bmi ? `<span class="badge ${bmiStatus(l.bmi)}">${l.bmi.toFixed(1)}</span>` : '—'}</div>
      <div>${l.fat_pct !== undefined ? `<span class="badge ${fatStatus(l.fat_pct, p.sex)}">${l.fat_pct.toFixed(1)}%</span>` : '—'}</div>
      <div>${l.visceral !== undefined ? `<span class="badge ${viscStatus(l.visceral)}">${l.visceral}</span>` : '—'}</div>
      <div><button class="btn">Ver →</button></div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="pt-table">
      <div class="pt-head"><div>Paciente</div><div>IMC</div><div>Gordura</div><div>Visceral</div><div></div></div>
      ${rows}
    </div>`;
}

async function selectPatient(id) {
  const data = await api('GET', `/bioscan/patients/${id}`);
  if (data) showPatient(data);
}

// ── NEW PATIENT ───────────────────────────────────────────────────────────
function renderNewPatient() {
  document.getElementById('content').innerHTML = `
    <div style="max-width:560px">
      <div class="card">
        <div class="card-title">Dados do paciente</div>
        <div class="form-row"><label>Nome completo *</label><input type="text" id="np-name" placeholder="Nome do paciente"></div>
        <div class="grid grid-2">
          <div class="form-row"><label>CPF *</label><input type="text" id="np-cpf" placeholder="000.000.000-00" maxlength="14"></div>
          <div class="form-row"><label>Celular <small>(opcional)</small></label><input type="text" id="np-phone" placeholder="(11) 91234-5678" maxlength="15"></div>
        </div>
        <div class="form-row"><label>E-mail *</label><input type="email" id="np-email" placeholder="email@exemplo.com"></div>
        <div class="form-row"><label>Data de nascimento * <small>(usada para login)</small></label><input type="date" id="np-birth"></div>
        <div class="grid grid-2">
          <div class="form-row"><label>Sexo</label>
            <select id="np-sex"><option value="">—</option><option value="M">Masculino</option><option value="F">Feminino</option></select>
          </div>
          <div class="form-row"><label>Altura (cm)</label><input type="number" id="np-height" placeholder="175"></div>
        </div>
        <div class="form-row"><label>Observações</label><input type="text" id="np-notes" placeholder="Diagnósticos, contexto clínico..."></div>
        <div id="np-result"></div>
        <button class="btn btn-primary" style="width:100%;margin-top:1rem" onclick="createPatient()">Cadastrar paciente</button>
      </div>
    </div>`;

  document.getElementById('np-cpf').oninput   = e => e.target.value = maskCPF(e.target.value);
  document.getElementById('np-phone').oninput = e => e.target.value = maskPhone(e.target.value);
}

async function createPatient() {
  const result = document.getElementById('np-result');
  const name   = document.getElementById('np-name').value.trim();
  const cpf    = document.getElementById('np-cpf').value.trim();
  const phone  = document.getElementById('np-phone').value.trim();
  const email  = document.getElementById('np-email').value.trim();
  const birth  = document.getElementById('np-birth').value;

  if (!name || !email || !birth || !cpf) {
    result.innerHTML = '<div class="error-box">Preencha nome, CPF, e-mail e data de nascimento.</div>';
    return;
  }

  result.innerHTML = '<div style="color:#999;font-size:12px;margin-top:.5rem">Cadastrando...</div>';

  const data = await api('POST', '/bioscan/patients', {
    name, email, cpf, phone: phone || null,
    birth_date: birth,
    sex:        document.getElementById('np-sex').value || null,
    height_cm:  parseFloat(document.getElementById('np-height').value) || null,
    notes:      document.getElementById('np-notes').value || null,
  });

  if (!data) return;

  if (data.error) {
    result.innerHTML = `<div class="error-box">${data.error}</div>`;
  } else {
    result.innerHTML = `
      <div class="success-box">✓ Paciente cadastrado com sucesso!</div>
      <div class="info-box">
        <strong>Credenciais de acesso do paciente:</strong><br>
        E-mail: <strong>${data.user.email}</strong><br>
        Data de nascimento: <strong>${birth}</strong><br>
        URL: <strong>bioscan.tridash.fit</strong>
      </div>`;
  }
}

// ── OVERVIEW ──────────────────────────────────────────────────────────────
function renderOverview() {
  const p = currentPatient;
  const ms = p.measurements || [];
  const m = ms.length > 0 ? ms[ms.length - 1] : null;

  if (!m) {
    document.getElementById('content').innerHTML = `
      <div class="card" style="text-align:center;padding:2rem;color:#bbb">
        Nenhuma medição encontrada.<br><br>
        ${isDoctor ? '<button class="btn btn-primary" onclick="showScreen(\'upload\')">↑ Importar CSV Tanita</button>' : ''}
      </div>`;
    return;
  }

  const age = p.age || '—';
  const metaDiff = m.meta_age && p.age ? m.meta_age - p.age : null;
  const metaColor = metaDiff === null ? '#bbb' : metaDiff < 0 ? '#2d6a1f' : metaDiff <= 5 ? '#1a6fa8' : '#9b1c1c';

  document.getElementById('content').innerHTML = `
    <div class="grid grid-4">
      <div class="mcard"><div class="mcard-label">Peso</div><div class="mcard-val">${m.weight?.toFixed(1)}<span class="mcard-unit">kg</span></div><div class="mcard-sub">IMC ${m.bmi?.toFixed(1)} · <span class="badge ${bmiStatus(m.bmi)}">${bl(bmiStatus(m.bmi))}</span></div></div>
      <div class="mcard"><div class="mcard-label">Gordura corporal</div><div class="mcard-val">${m.fat_pct?.toFixed(1)}<span class="mcard-unit">%</span></div><span class="badge ${fatStatus(m.fat_pct, p.sex)}">${bl(fatStatus(m.fat_pct, p.sex))}</span></div>
      <div class="mcard"><div class="mcard-label">Massa muscular</div><div class="mcard-val">${m.muscle_kg?.toFixed(1)}<span class="mcard-unit">kg</span></div><div class="mcard-sub">Qualidade: ${m.muscle_quality || '—'}</div></div>
      <div class="mcard"><div class="mcard-label">Visceral</div><div class="mcard-val">${m.visceral}</div><span class="badge ${viscStatus(m.visceral)}">${bl(viscStatus(m.visceral))}</span></div>
    </div>
    <div class="grid grid-4">
      <div class="mcard"><div class="mcard-label">Água corporal</div><div class="mcard-val">${m.water_pct?.toFixed(1)}<span class="mcard-unit">%</span></div></div>
      <div class="mcard"><div class="mcard-label">Massa óssea</div><div class="mcard-val">${m.bone_kg?.toFixed(2)}<span class="mcard-unit">kg</span></div></div>
      <div class="mcard"><div class="mcard-label">Metabolismo basal</div><div class="mcard-val">${m.bmr?.toFixed(0)}<span class="mcard-unit">kcal</span></div></div>
      <div class="mcard"><div class="mcard-label">FC repouso</div><div class="mcard-val">${m.heart_rate || '—'}${m.heart_rate ? '<span class="mcard-unit">bpm</span>' : ''}</div></div>
    </div>
    <div class="grid grid-2">
      <div class="card">
        <div class="card-title">Idade metabólica vs. real</div>
        <div class="age-row">
          <div><div class="age-num" style="color:#bbb">${age}</div><div class="age-lbl">Idade real</div></div>
          <div style="font-size:20px;color:#ddd">→</div>
          <div><div class="age-num" style="color:${metaColor}">${m.meta_age || '—'}</div><div class="age-lbl">Metabólica</div></div>
          ${metaDiff !== null ? `<div><div style="font-size:16px;font-weight:600;color:${metaColor}">${metaDiff > 0 ? '+' : ''}${metaDiff}</div><div class="age-lbl">anos</div></div>` : ''}
        </div>
        <div style="margin-top:1rem">
          ${(p.risk_flags || []).map(f => `<div class="badge ${f.level}" style="display:block;margin-bottom:4px;padding:4px 8px">${f.message}</div>`).join('')}
        </div>
      </div>
      ${isDoctor ? `
      <div class="card">
        <div class="card-title">Interpretação IA <small>Groq llama-3.3-70b</small></div>
        <div id="interpret-box" class="interpret-box" style="color:#bbb;font-style:italic">Clique em "Gerar interpretação" para analisar.</div>
        <button class="btn btn-primary" style="margin-top:.75rem;width:100%" onclick="getInterpretation()">Gerar interpretação</button>
      </div>` : `
      <div class="card">
        <div class="card-title">Resumo clínico</div>
        <div style="font-size:13px;color:#666;line-height:1.7">
          Seus dados foram analisados pela equipe médica.<br>
          Para interpretação detalhada, consulte seu médico.
        </div>
      </div>`}
    </div>`;
}

async function getInterpretation() {
  const box = document.getElementById('interpret-box');
  box.textContent = 'Analisando dados com IA...';
  box.style.color = '#bbb';
  box.style.fontStyle = 'italic';
  const data = await api('POST', `/bioscan/patients/${currentPatient.id}/interpret`);
  if (data && data.interpretation) {
    box.textContent = data.interpretation;
    box.style.color = '#1a1a18';
    box.style.fontStyle = 'normal';
  } else {
    box.textContent = data?.error || 'Erro ao gerar interpretação.';
  }
}

// ── EVOLUTION ─────────────────────────────────────────────────────────────
function renderEvolution() {
  const ms = currentPatient.measurements || [];
  if (!ms.length) {
    document.getElementById('content').innerHTML = '<div class="loading">Nenhuma medição encontrada.</div>';
    return;
  }

  const rows = [...ms].reverse().map(m => `<tr>
    <td>${m.measured_at?.substring(0,10)}</td>
    <td>${m.weight?.toFixed(1)} kg</td>
    <td><span class="badge ${fatStatus(m.fat_pct, currentPatient.sex)}">${m.fat_pct?.toFixed(1)}%</span></td>
    <td>${m.muscle_kg?.toFixed(2)} kg</td>
    <td><span class="badge ${viscStatus(m.visceral)}">${m.visceral}</span></td>
    <td>${m.meta_age ? m.meta_age + ' anos' : '—'}</td>
    <td>${m.bmr?.toFixed(0)} kcal</td>
  </tr>`).join('');

  const chartCards = ms.length >= 2 ? `
    <div class="grid grid-2">
      <div class="card"><div class="card-title">Peso <small>${ms.length} medições</small></div><div class="chart-container"><canvas id="ch-weight"></canvas></div></div>
      <div class="card"><div class="card-title">Gordura corporal</div><div class="chart-container"><canvas id="ch-fat"></canvas></div></div>
    </div>
    <div class="grid grid-2">
      <div class="card"><div class="card-title">Massa muscular</div><div class="chart-container"><canvas id="ch-muscle"></canvas></div></div>
      <div class="card"><div class="card-title">Gordura visceral</div><div class="chart-container"><canvas id="ch-visc"></canvas></div></div>
    </div>
    <div class="grid grid-2">
      <div class="card"><div class="card-title">Idade metabólica</div><div class="chart-container"><canvas id="ch-meta"></canvas></div></div>
      <div class="card"><div class="card-title">Metabolismo basal</div><div class="chart-container"><canvas id="ch-bmr"></canvas></div></div>
    </div>` : `
    <div class="card" style="text-align:center;color:#bbb;padding:2rem">
      Necessárias pelo menos 2 medições para gerar gráficos evolutivos.<br>
      <small>Medição atual: ${ms.length}</small>
    </div>`;

  document.getElementById('content').innerHTML = chartCards + `
    <div class="card">
      <div class="card-title">Histórico de medições <small>${ms.length} registro(s)</small></div>
      <table class="evo-tbl">
        <thead><tr><th>Data</th><th>Peso</th><th>Gordura</th><th>Músculo</th><th>Visceral</th><th>Id. met.</th><th>BMR</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  if (ms.length >= 2) renderCharts(ms);
}

function renderCharts(ms) {
  const labels = ms.map(m => m.measured_at?.substring(0,10));

  const base = {
    type: 'line',
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#999' } },
        y: { grid: { color: '#f0f0f0' }, ticks: { font: { size: 10 }, color: '#999' } }
      },
      elements: { point: { radius: 3, hoverRadius: 5 }, line: { tension: 0.3, borderWidth: 2 } }
    }
  };

  const mkChart = (id, values, color) => {
    const ctx = document.getElementById(id);
    if (!ctx) return;
    charts[id] = new Chart(ctx, {
      ...base,
      data: { labels, datasets: [{ data: values, borderColor: color, backgroundColor: color + '20', fill: true }] }
    });
  };

  mkChart('ch-weight', ms.map(m => m.weight),    '#1a6fa8');
  mkChart('ch-fat',    ms.map(m => m.fat_pct),   '#e67e22');
  mkChart('ch-muscle', ms.map(m => m.muscle_kg), '#2d6a1f');
  mkChart('ch-visc',   ms.map(m => m.visceral),  '#c0392b');
  mkChart('ch-meta',   ms.map(m => m.meta_age),  '#8e44ad');
  mkChart('ch-bmr',    ms.map(m => m.bmr),       '#16a085');
}

// ── SEGMENTS — Corpo humano ──────────────────────────────────────────────
function renderSegments() {
  const ms = currentPatient.measurements || [];
  if (!ms.length) {
    document.getElementById('content').innerHTML = '<div class="loading">Nenhuma medição encontrada.</div>';
    return;
  }
  const m = ms[ms.length - 1];

  document.getElementById('content').innerHTML = `
    <div class="grid grid-2">
      <div class="card">
        <div class="card-title">Distribuição corporal <small>medição ${m.measured_at?.substring(0,10)}</small></div>
        <div class="body-toggle">
          <button class="body-toggle-btn active" id="tog-fat"   onclick="showBodyMode('fat')">Gordura %</button>
          <button class="body-toggle-btn"        id="tog-musc"  onclick="showBodyMode('musc')">Músculo kg</button>
        </div>
        <div id="body-svg" class="body-diagram"></div>
        <div class="body-legend" id="body-legend"></div>

        <div id="seg-detail"></div>

}

function showBodyMode(mode) {
  const m = window._bodyData;
  document.getElementById('tog-fat').classList.toggle('active', mode === 'fat');
  document.getElementById('tog-musc').classList.toggle('active', mode === 'musc');

  const data = mode === 'fat' ? m.seg_fat : m.seg_musc;
  const unit = mode === 'fat' ? '%' : 'kg';

  // Normalizar para escala de cor (0-100%)
  const values = Object.values(data).filter(v => v != null);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;

  const colorFor = (v) => {
    if (v == null) return '#eee';
    const t = (v - min) / range;
    if (mode === 'fat') {
      // Gordura: verde (baixo) → amarelo → vermelho (alto)
      if (t < 0.5) {
        const k = t * 2;
        return `rgb(${Math.round(45 + k*200)}, ${Math.round(106 + k*50)}, ${Math.round(31 + k*0)})`;
      } else {
        const k = (t - 0.5) * 2;
        return `rgb(${Math.round(245 - k*50)}, ${Math.round(156 - k*120)}, ${Math.round(31 - k*0)})`;
      }
    } else {
      // Músculo: azul claro (baixo) → azul escuro (alto) — mais é melhor
      const k = t;
      return `rgb(${Math.round(180 - k*140)}, ${Math.round(210 - k*140)}, ${Math.round(235 - k*50)})`;

  const fmt = v => v == null ? '—' : v.toFixed(mode === 'fat' ? 1 : 2);

            fill="#d5d4ce" stroke="#aaa" stroke-width="1"/>

            fill="#d5d4ce" stroke="#aaa" stroke-width="1"/>

      <!-- Tronco: ombros largos, cintura, quadril -->
      <path d="M 125 102
               C 115 104, 100 108, 92 118
               Q 86 128, 88 142
               C 90 160, 92 180, 94 198
               Q 96 215, 100 228
               C 103 240, 106 252, 108 262
               Q 110 270, 114 275
               L 166 275
               Q 170 270, 172 262
               C 174 252, 177 240, 180 228
               Q 184 215, 186 198
               C 188 180, 190 160, 192 142
               Q 194 128, 188 118
               C 180 108, 165 104, 155 102 Z"
            fill="${colorFor(data.trunk)}" stroke="#888" stroke-width="1.3" stroke-linejoin="round"/>
      <text x="140" y="188" text-anchor="middle" class="seg-label" fill="#1a1a18">Tronco</text>
      <text x="140" y="204" text-anchor="middle" class="seg-label-sub" fill="#333">${fmt(data.trunk)}${unit}</text>

      <!-- Braço direito do paciente (esquerda na tela): ombro, bíceps, antebraço, mão -->
      <path d="M 92 118
               C 82 120, 72 128, 66 142
               Q 60 160, 58 182
               C 56 204, 54 226, 52 246
               Q 50 262, 48 274
               C 47 282, 48 288, 52 292
               Q 56 294, 62 292
               C 66 288, 68 282, 70 274
               Q 72 262, 74 246
               C 76 226, 78 204, 82 182
               Q 86 160, 92 142
               C 94 132, 94 124, 92 118 Z"
            fill="${colorFor(data.right_arm)}" stroke="#888" stroke-width="1.3" stroke-linejoin="round"/>
      <text x="62" y="188" text-anchor="middle" class="seg-label" fill="#1a1a18">Braço D</text>
      <text x="62" y="204" text-anchor="middle" class="seg-label-sub" fill="#333">${fmt(data.right_arm)}${unit}</text>

      <!-- Braço esquerdo do paciente (direita na tela) -->
      <path d="M 188 118
               C 198 120, 208 128, 214 142
               Q 220 160, 222 182
               C 224 204, 226 226, 228 246
               Q 230 262, 232 274
               C 233 282, 232 288, 228 292
               Q 224 294, 218 292
               C 214 288, 212 282, 210 274
               Q 208 262, 206 246
               C 204 226, 202 204, 198 182
               Q 194 160, 188 142
               C 186 132, 186 124, 188 118 Z"
            fill="${colorFor(data.left_arm)}" stroke="#888" stroke-width="1.3" stroke-linejoin="round"/>
      <text x="218" y="188" text-anchor="middle" class="seg-label" fill="#1a1a18">Braço E</text>
      <text x="218" y="204" text-anchor="middle" class="seg-label-sub" fill="#333">${fmt(data.left_arm)}${unit}</text>

      <!-- Perna direita: coxa, joelho, panturrilha, tornozelo -->
      <path d="M 114 275
               C 112 290, 110 310, 108 332
               Q 107 358, 108 382
               C 109 400, 111 418, 114 432

               C 137 396, 136 376, 136 354
               Q 137 328, 138 300

            fill="${colorFor(data.right_leg)}" stroke="#888" stroke-width="1.3" stroke-linejoin="round"/>
      <text x="122" y="348" text-anchor="middle" class="seg-label" fill="#1a1a18">Perna D</text>
      <text x="122" y="364" text-anchor="middle" class="seg-label-sub" fill="#333">${fmt(data.right_leg)}${unit}</text>

      <!-- Perna esquerda -->
      <path d="M 166 275
               C 168 290, 170 310, 172 332
               Q 173 358, 172 382
               C 171 400, 169 418, 166 432

    <div class="body-legend-item"><div class="body-legend-dot" style="background:${colorFor((min+max)/2)}"></div>Médio</div>
    <div class="body-legend-item"><div class="body-legend-dot" style="background:${colorFor(max)}"></div>Maior (${fmt(max)}${unit})</div>`;

function renderSegDetail(m) {
  const segs = [
    {name:'Braço direito',  key:'right_arm'},
    {name:'Braço esquerdo', key:'left_arm'},
    {name:'Perna direita',  key:'right_leg'},
    {name:'Perna esquerda', key:'left_leg'},
    {name:'Tronco',         key:'trunk'},
  ];

  const rows = segs.map(s => {
    const f = m.seg_fat[s.key];
    const mc = m.seg_musc[s.key];
    const q = m.seg_qual[s.key];
    return `<tr>
      <td style="font-weight:500">${s.name}</td>
      <td>${f != null ? f.toFixed(1) + '%' : '—'}</td>
      <td>${mc != null ? mc.toFixed(2) + ' kg' : '—'}</td>
      <td>${q != null ? `<span class="badge ok">${q}</span>` : '—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('seg-detail').innerHTML = `
    <table class="evo-tbl">
      <thead><tr><th>Segmento</th><th>Gordura</th><th>Músculo</th><th>Qualidade</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── UPLOAD ────────────────────────────────────────────────────────────────
function renderUpload() {
  document.getElementById('content').innerHTML = `
    <div style="max-width:500px">
      <div class="card">
        <div class="card-title">Importar CSV Tanita</div>
        <div class="form-row"><label>ID do paciente *</label>
          <input type="number" id="upload-pid" placeholder="ID do paciente">
        </div>
        <div class="upload-zone" onclick="openCSVPicker()">
          <div style="font-size:22px;margin-bottom:.5rem">↑</div>
          <div style="font-size:13px;color:#999">Clique para selecionar o CSV exportado pela balança Tanita</div>
          <div style="font-size:11px;color:#ccc;margin-top:4px">BC-780, BC-545N, MC-780MA e compatíveis</div>
        </div>
        <input type="file" id="csvfile" accept=".csv" style="display:none" onchange="uploadCSV(this)">
        <div id="upload-result"></div>
      </div>
      <div class="card">
        <div class="card-title">Pacientes cadastrados <small>(clique para selecionar)</small></div>
        <div id="upload-patients"><div class="loading" style="padding:1rem">Carregando...</div></div>
      </div>
    </div>`;
  loadUploadPatients();
}

async function loadUploadPatients() {
  const ps = await api('GET', '/bioscan/patients');
  if (!ps) return;
  const html = ps.length
    ? ps.map(p => `<div style="padding:.4rem 0;font-size:13px;border-bottom:1px solid #f0f0f0;cursor:pointer" onclick="document.getElementById('upload-pid').value=${p.id}"><strong>ID ${p.id}</strong> — ${p.name}${p.cpf ? ' · ' + p.cpf : ''}</div>`).join('')
    : '<div style="color:#bbb;font-size:13px">Nenhum paciente cadastrado.</div>';
  document.getElementById('upload-patients').innerHTML = html;
}

function openCSVPicker() {
  const pid = document.getElementById('upload-pid').value;
  const result = document.getElementById('upload-result');
  if (!pid) {
    result.innerHTML = '<div class="error-box">Informe o ID do paciente antes de selecionar o arquivo.</div>';
    return;
  }
  result.innerHTML = '';
  document.getElementById('csvfile').click();
}

async function uploadCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const pid = document.getElementById('upload-pid').value;
  const result = document.getElementById('upload-result');
  result.innerHTML = '<div style="color:#999;font-size:12px;margin-top:.5rem">Importando...</div>';

  const form = new FormData();
  form.append('csv', file);

  const data = await api('POST', `/bioscan/patients/${pid}/import-csv`, form, true);
  if (!data) return;

  if (data.error) {
    result.innerHTML = `<div class="error-box">${data.error}</div>`;
  } else {
    result.innerHTML = `<div class="success-box">
      ✓ ${data.inserted} medição(ões) importada(s) · ${data.skipped} ignorada(s) (duplicata)
    </div>`;
  }
  input.value = '';
}

showScreen('list');
</script>
